name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEXT (${{ inputs.bump }})"

      - name: Bump version in files
        run: |
          VERSION=${{ steps.version.outputs.next }}
          # package.json
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # tauri.conf.json
          node -e "
            const conf = require('./src-tauri/tauri.conf.json');
            conf.version = '$VERSION';
            require('fs').writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          # Cargo.toml
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "release: v${{ steps.version.outputs.next }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin main --tags

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'QTE Time Tracker ${{ steps.version.outputs.tag }}'
          releaseBody: |
            ## QTE Time Tracker ${{ steps.version.outputs.tag }}

            Download the `.dmg` file below and drag to Applications.

            **First install:** Right-click the app → Open → confirm (one time only).
            **Updates:** The app checks for updates automatically.
          releaseDraft: false
          prerelease: false

      - name: Upload updater files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          VERSION=${{ steps.version.outputs.next }}
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"

          echo "Looking for files in $BUNDLE_DIR:"
          ls -la "$BUNDLE_DIR/" || true
          echo "---"

          # Also check the parent for sig files
          find src-tauri/target/release/bundle -name "*.sig" -o -name "*.tar.gz" 2>/dev/null
          echo "---"

          SIG_FILE="$BUNDLE_DIR/QTE Time Tracker.app.tar.gz.sig"
          TAR_FILE="$BUNDLE_DIR/QTE Time Tracker.app.tar.gz"

          if [ ! -f "$SIG_FILE" ] || [ ! -f "$TAR_FILE" ]; then
            echo "Missing sig or tar file"
            echo "SIG exists: $(test -f "$SIG_FILE" && echo yes || echo no)"
            echo "TAR exists: $(test -f "$TAR_FILE" && echo yes || echo no)"
            exit 0
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          # The tauri-action uploads with dots instead of spaces
          TAR_NAME="QTE.Time.Tracker_aarch64.app.tar.gz"

          # Upload .sig file
          gh release upload "$TAG" "$SIG_FILE" --clobber

          # Generate and upload latest.json
          cat > /tmp/latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "QTE Time Tracker $TAG",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/Kaijonsson/agileday-tracker/releases/download/$TAG/$TAR_NAME"
              },
              "darwin-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/Kaijonsson/agileday-tracker/releases/download/$TAG/$TAR_NAME"
              }
            }
          }
          ENDJSON

          gh release upload "$TAG" /tmp/latest.json --clobber
          echo "Uploaded latest.json and .sig file"
