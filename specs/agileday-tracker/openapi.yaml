  /v1/finance/projectlike/{projectlikeId}/monthly:
    get:
      tags:
        - Projects:Finance
      summary: Get monthly financial data for a projectlike
      description: |
        Returns monthly financial data per calendar month for a project or opportunity.
        Each month combines actual (realized) amounts with projected backlog and sales,
        counting all allocations regardless of probability.

        **Access Control:**
        - Admin roles (agileday_admin, administrator, hr_admin, project_admin, sales_admin, staffing_admin) have full access
        - Employee role has access if they are: project manager, project assistant, customer manager, company manager, business unit lead, parent team lead, sales owner, or presales owner
        - Other roles have no access

        **Formats:**
        - Omit `format` (or set to anything other than `xlsx`) for a JSON response.
        - Set `format=xlsx` to download an XLSX file with one row per month.
      operationId: getMonthlyFinancials
      parameters:
        - name: projectlikeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The projectlike ID (project or opportunity)
        - name: targetCurrencyCode
          in: query
          required: false
          schema:
            type: string
          description: |
            Target currency for conversion. Options:
            - specific code (e.g., "EUR", "USD")
            - "primary": use tenant's primary currency
            - "none": no conversion (default)
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum:
              - xlsx
          description: Set to "xlsx" to download an XLSX file instead of JSON.
      responses:
        '200':
          description: |
            Monthly financial data. Returns JSON by default, or an XLSX file when `format=xlsx` is specified.
          headers:
            Content-Disposition:
              description: Present only when `format=xlsx` is requested. Contains the suggested filename for the download.
              schema:
                type: string
                example: attachment; filename=monthly-financials.xlsx
          content:
            application/json:
              schema:
                type: object
                properties:
                  currencyCode:
                    type: string
                    description: ISO 4217 currency code for all financial values
                  months:
                    type: array
                    description: Financial data broken down by calendar month
                    items:
                      $ref: '#/components/schemas/MonthlyFinancialsMonth'
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized - Missing or invalid authentication
        '403':
          description: Forbidden - Insufficient permissions
        '404':
          description: Projectlike not found
      security:
        - bearerAuth: []
