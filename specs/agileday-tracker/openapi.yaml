  - name: Finance:Revenue Recognition
    x-summary: Manage revenue recognition tracking
    description: |
      Track and manage revenue recognition for projects on a monthly basis, supporting percentage-of-completion and other revenue recognition methods. Revenue recognition entries can be managed in the Agileday UI or via the API. The API is particularly useful for integrating with financial systems that need monthly revenue data for reporting and compliance.

      **When to use:**
      - Recording monthly revenue recognition for projects
      - Tracking cumulative costs and forecasted costs for POC calculations
      - Managing revenue recognition adjustments and valuations
      - Locking finalized revenue recognition entries for reporting periods
      - Integrating revenue recognition data with financial systems

      **Key concepts:**
      - Revenue recognition entries are tracked monthly (first day of each month)
      - Supports percentage-of-completion (POC) method with cost-based calculations
      - Each entry includes recognized revenue amount and optional calculation fields
      - Entries can be locked to prevent changes after period close
      - Tracks cumulative costs, forecasted costs, and target deal size for POC
      - Includes valuation date for audit trail and financial reporting
      - Uses same permission model as project finance (project managers, finance roles)

      **Common workflow:**
      1. `POST /v1/revenue_recognition` - Create monthly revenue recognition entry. Specify `projectlikeId` (a project or opportunity ID), month (first day), and recognized revenue amount. Optionally include POC calculation fields.
      2. `GET /v1/revenue_recognition/projectlike/{id}` - Retrieve all entries for a project or opportunity (pass the project or opportunity ID)
      3. `PATCH /v1/revenue_recognition/id/{id}` - Update entry before locking
      4. `PATCH /v1/revenue_recognition/id/{id}` with `isLocked: true` - Lock entry after month close
      5. `GET /v1/revenue_recognition/projectlike/{id}/monthly` - Get monthly summary for export
