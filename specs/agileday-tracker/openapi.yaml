  - name: Core Data:Work Packages
    x-summary: Configure country-specific public holidays from 2026 onwards
    description: |
      Work Packages manage the working day calendar for your organization. In practice, this means configuring which public holidays count as non-working days per country, and defining custom company holidays. These settings drive working day calculations used in flex balances and allocations. Holiday configuration takes effect from 1 January 2026 onwards.

      **When to use:**
      - Configuring which national/bank holidays are recognized as non-working days per country
      - Adding company-specific holidays (e.g. company anniversary, local office closures)
      - Enabling or disabling individual public holidays for flex balance and allocation calculations
      - Querying enabled holidays within a date range for scheduling or flex calculations

      **Key concepts:**
      - Holiday settings are country-scoped (identified by ISO 3166-1 alpha-2 code, e.g. FI, SE, US)
      - Standard holidays are sourced from the public holiday calendar for the country. Each can be individually enabled or disabled.
      - Work pattern holidays (company holidays) are custom dates added by admins on top of the standard set
      - All holiday changes affect working day counts used in flex balance and allocation calculations
      - Dates before 1 January 2026 are not supported
      - Read access for all authenticated users; write access requires sales_admin or higher

      **Common workflow:**
      1. `GET /v1/workpackages/{countryCode}/holidays/available` - List all available holidays with their current enabled/disabled status
      2. `PUT /v1/workpackages/{countryCode}/holidays/settings` - Batch enable or disable standard holidays
      3. `POST /v1/workpackages/{countryCode}/work-pattern-holidays` - Add a custom company holiday
      4. `GET /v1/workpackages/{countryCode}/holidays?startDate=...&endDate=...` - Query enabled holidays for a date range
      5. `PUT /v1/workpackages/{countryCode}/work-pattern-holidays/{id}` - Update a custom holiday
      6. `DELETE /v1/workpackages/{countryCode}/work-pattern-holidays/{id}` - Remove a company holiday
    x-displayName: Core Data:Work Packages
