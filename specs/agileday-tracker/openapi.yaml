  /v1/oauth/clients:
    get:
      summary: List all OAuth clients
      description: |
        Returns all statically registered OAuth 2.1 clients for the tenant. Dynamically registered clients (created via the RFC 7591 `/register` endpoint) are not included in this list.

        Each client entry includes its full configuration but never exposes the client secret — secrets are only returned at creation time or after an explicit regeneration.

        Requires administrator role.
      operationId: listOAuthClients
      tags:
        - Integration:OAuth Clients
      responses:
        '200':
          description: List of OAuth clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OAuthClient'
        '403':
          description: Forbidden - Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    post:
      summary: Create a new OAuth client
      description: |
        Creates a new statically registered OAuth 2.1 client. The server generates a cryptographically random `client_id` and `client_secret`.

        **The `client_secret` is returned only in this response and cannot be retrieved again.** Store it in a secrets manager immediately. If the secret is lost, use the regenerate-secret endpoint to issue a new one.

        The client is immediately active after creation. Configure `redirect_uris` with all callback URLs the client application will use during the authorization code flow. All redirect URIs must use HTTPS in production.

        To restrict which MCP tools the client can invoke, set `allowed_tools` to a list of tool names from `GET /v1/mcp/tools`. Leave it null or omit it to allow all tools.

        Requires administrator role.
      operationId: createOAuthClient
      tags:
        - Integration:OAuth Clients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthClientCreateRequest'
      responses:
        '201':
          description: Client created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientWithSecret'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
  /v1/oauth/clients/{clientId}:
    get:
      summary: Get a single OAuth client
      description: |
        Returns the full configuration of a specific OAuth client by its `client_id`. The client secret is never included in the response.

        Returns 404 if the client does not exist or has been deleted.

        Requires administrator role.
      operationId: getOAuthClient
      tags:
        - Integration:OAuth Clients
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: The client ID
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClient'
        '403':
          description: Forbidden - Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    put:
      summary: Update an OAuth client
      description: |
        Updates the configuration of an existing OAuth client. All fields in the request body replace the current values — omitted optional fields are left unchanged.

        Changes take effect immediately for all subsequent authentication requests. **Existing issued tokens are not affected** by configuration changes; they remain valid until they expire.

        To deactivate a client without deleting it, set `is_active` to `false`. This blocks all new authentication attempts while preserving the client record.

        Requires administrator role.
      operationId: updateOAuthClient
      tags:
        - Integration:OAuth Clients
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: The client ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthClientUpdateRequest'
      responses:
        '200':
          description: Client updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClient'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    delete:
      summary: Delete an OAuth client
      description: |
        Permanently revokes an OAuth client. The deletion is immediate — the client can no longer be used for authentication. **Existing valid tokens issued to this client may still be accepted until they naturally expire.**

        Deletion cannot be undone via the API. If you need to temporarily suspend a client rather than remove it, use `PUT /v1/oauth/clients/{clientId}` with `is_active: false` instead.

        Requires administrator role.
      operationId: deleteOAuthClient
      tags:
        - Integration:OAuth Clients
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: The client ID
      responses:
        '204':
          description: Client deleted successfully
        '403':
          description: Forbidden - Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
  /v1/oauth/clients/{clientId}/regenerate-secret:
    post:
      summary: Regenerate client secret
      description: |
        Generates a new client secret for an existing OAuth client. **The previous secret is invalidated immediately** — any applications still using it will fail to authenticate from this point on.

        The new secret is returned only in this response and cannot be retrieved again. Update all applications using this client before calling this endpoint, or coordinate the secret rotation with minimal downtime.

        This endpoint is also the recovery path if a secret is lost: since secrets cannot be retrieved after creation, regeneration is the only way to obtain a usable secret.

        Requires administrator role.
      operationId: regenerateOAuthClientSecret
      tags:
        - Integration:OAuth Clients
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: The client ID
      responses:
        '200':
          description: Secret regenerated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientSecretResponse'
        '403':
          description: Forbidden - Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
  /v1/oauth/settings:
    get:
      summary: Get OAuth settings
      description: |
        Returns the tenant-level OAuth configuration, including the master enable/disable switch and all policies governing dynamic client registration (RFC 7591).

        When `oauth_enabled` is `false`, no OAuth authentication flows will succeed for any client — this acts as a global kill switch regardless of individual client configurations.

        When `dynamic_clients_enabled` is `true`, external applications can self-register as OAuth clients at runtime via the `/register` endpoint, within the constraints defined by `dynamic_client_minimum_role`, `dynamic_client_maximum_role`, `dynamic_client_allowed_tools`, and the token validity settings.

        Requires administrator role.
      operationId: getOAuthSettings
      tags:
        - Integration:OAuth Clients
      responses:
        '200':
          description: OAuth settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthSettings'
        '403':
          description: Forbidden - Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    put:
      summary: Update OAuth settings
      description: |
        Updates the tenant-level OAuth configuration. All fields in the request body replace the current values.

        **Disabling OAuth** (`oauth_enabled: false`) immediately blocks all OAuth authentication flows for the tenant. Any in-flight authorization requests will fail. Use this as an emergency kill switch if OAuth access needs to be suspended.

        **Dynamic client registration** (`dynamic_clients_enabled`) controls whether external applications can self-register via RFC 7591. When disabled, only statically registered clients (managed via `POST /v1/oauth/clients`) can authenticate. Dynamic registration is useful for enabling AI assistants to register themselves without administrator involvement, but should be paired with conservative `dynamic_client_minimum_role` and short token lifetimes for security.

        `dynamic_client_max_session_duration_seconds` sets an absolute wall-clock limit from the initial authorization, after which refresh tokens are rejected even if they have not individually expired. This bounds the lifetime of any single session regardless of refresh token validity.

        Requires administrator role.
      operationId: updateOAuthSettings
      tags:
        - Integration:OAuth Clients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthSettingsUpdateRequest'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthSettings'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
