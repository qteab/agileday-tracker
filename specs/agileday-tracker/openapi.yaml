        **Relationships:** Use the `relationships` array to link the company to addresses, leads, team members, or team offerings at creation time. Each relationship specifies:
        - `relationship`: One of `address`, `lead`, `teamMember`, `teamOffering`
        - `id` or `ids`: UUID(s) of the related entity (use `id` for single, `ids` for multiple)
        - `idField`: Usually `"id"` — the field to match against
        - `overwrite`: Replace existing relationships of this type
        - `ignoreMissing`: If true, skip missing IDs instead of failing

        **Example:** To create a company with a lead and address, include `relationships` with `relationship: "lead"` (with `id`) and `relationship: "address"` (with `id`).
