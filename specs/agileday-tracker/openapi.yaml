  /v1/revenue_recognition:
    post:
      tags:
        - Finance:Revenue Recognition
      summary: Create revenue recognition entry
      description: |
        Create a new revenue recognition entry for a project or opportunity.

        Revenue recognition entries track the amount of revenue recognized for a specific
        project in a given month. This is used for financial reporting and helps track
        project profitability over time according to accounting standards.

        **Required fields:**
        - `projectlikeId`: The project or opportunity this entry belongs to
        - `month`: The month for revenue recognition (must be first day of month)
        - `recognizedRevenue`: Amount of revenue recognized in project's currency
        - `comment`: Explanation or justification for this recognition
        - `valuationDate`: When this valuation was performed

        **Important constraints:**
        - Only one revenue recognition entry can exist per project per month
        - The `month` field must be the first day of the month (YYYY-MM-01 format)
        - Once locked (`isLocked: true`), entries cannot be modified or deleted
        - The `lastUpdatedBy` field is automatically set to the current user and updated on modifications

        **Use cases:**
        - Recording monthly revenue recognition for fixed-price projects
        - Tracking percentage-of-completion revenue
        - Maintaining audit trail for financial reporting
      operationId: CreateRevenueRecognition
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Revenue recognition data to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/revenueRecognitionCreateRequest'
            example:
              projectlikeId: 123e4567-e89b-12d3-a456-426614174000
              month: '2024-03-01'
              recognizedRevenue: 15000
              comment: Revenue recognized based on 60% project completion using cost-to-cost method
              valuationDate: '2024-03-15'
              isLocked: false
              cumulativeCosts: 36000
              forecastedCosts: 60000
              targetDealSize: 100000
              cumulativeCalculatedRevenueRecognition: 60000
              previouslyRecognizedRevenue: 45000
      responses:
        '200':
          description: Revenue recognition entry created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/revenueRecognitionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/revenue_recognition/id/{id}:
    get:
      tags:
        - Finance:Revenue Recognition
      summary: Get revenue recognition entry by ID
      description: |
        Retrieve a single revenue recognition entry by its internal UUID.

        Returns the complete entry details including all calculation fields and audit information.

        **Use cases:**
        - Viewing details of a specific revenue recognition entry
        - Auditing revenue recognition history
        - Retrieving entry before updating
      operationId: GetRevenueRecognitionById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/revenueRecognitionIdParam'
      responses:
        '200':
          description: Revenue recognition entry found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/revenueRecognitionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Finance:Revenue Recognition
      summary: Update revenue recognition entry by ID
      description: |
        Partially update a revenue recognition entry by its internal UUID.

        Only include the fields you want to update. Omitted fields will retain their current values.

        **Important restrictions:**
        - Cannot update entries where `isLocked: true`. Unlock the entry first by setting `isLocked: false`.
        - Changing the `month` field may cause a conflict if another entry exists for that month.
        - The `lastUpdatedBy` field is automatically updated to the current user on each modification.

        **Use cases:**
        - Correcting revenue recognition amounts
        - Adding or updating calculation fields
        - Locking entries to prevent further changes
        - Updating comments for audit trail
      operationId: UpdateRevenueRecognitionById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/revenueRecognitionIdParam'
      requestBody:
        required: true
        description: Fields to update on the revenue recognition entry
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/revenueRecognitionUpdateRequest'
            example:
              recognizedRevenue: 17500
              comment: Updated after final cost review - adjusted from 60% to 70% completion
              cumulativeCosts: 42000
      responses:
        '200':
          description: Revenue recognition entry updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/revenueRecognitionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Finance:Revenue Recognition
      summary: Delete revenue recognition entry by ID
      description: |
        Delete a revenue recognition entry by its internal UUID.

        **Important restrictions:**
        - Cannot delete entries where `isLocked: true`. Unlock the entry first by setting `isLocked: false`.
        - This operation is permanent and cannot be undone.

        **Use cases:**
        - Removing incorrect or duplicate entries
        - Cleaning up test data

        **Note:** For finalized financial data, consider locking entries instead of deleting them
        to maintain audit trail.
      operationId: DeleteRevenueRecognitionById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/revenueRecognitionIdParam'
      responses:
        '200':
          description: Revenue recognition entry deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/revenueRecognitionDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
