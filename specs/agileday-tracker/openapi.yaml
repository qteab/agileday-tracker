            List of organizational entity types this position can be assigned to.
            A position can target multiple entity types simultaneously.
          items:
            $ref: '#/components/schemas/ManagerialPositionOfEnum'
          example:
            - team
            - businessUnit
        unique:
          type: boolean
          description: |
            When true, only one person can hold this position per target entity.
            For example, a unique "Team Lead" position means each team can have at most one Team Lead.
          example: true
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the position was created (ISO 8601).
          example: '2025-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the position was last updated (ISO 8601).
          example: '2025-03-10T14:22:00Z'
    ManagerialPositionCreateRequest:
      type: object
      description: Request body for creating a new managerial position.
      required:
        - name
        - targetType
      properties:
        name:
          type: string
          description: Display name for the new managerial position.
          example: Team Lead
        targetType:
          type: array
          description: List of organizational entity types this position can target.
          items:
            $ref: '#/components/schemas/ManagerialPositionOfEnum'
          example:
            - team
        unique:
          type: boolean
          default: false
          description: |
            Whether only one person can hold this position per target entity.
            Defaults to false if not specified.
          example: true
    ManagerialPositionUpdateRequest:
      type: object
      description: |
        Request body for updating a managerial position.
        All fields are optional; only provided fields will be updated.
      properties:
        name:
          type: string
          description: New display name for the managerial position.
          example: Senior Team Lead
        targetType:
          type: array
          description: Updated list of organizational entity types this position can target. Replaces the existing list entirely.
          items:
            $ref: '#/components/schemas/ManagerialPositionOfEnum'
          example:
            - team
            - businessUnit
        unique:
          type: boolean
          description: Updated uniqueness constraint for the position.
          example: true
