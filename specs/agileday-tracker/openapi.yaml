  /v1/flexbalance/totals:
    post:
      tags:
        - Time Tracking:Flex Balance
      summary: Get flex balance totals for filtered employees
      description: |
        Get flex balance totals for employees matching the filter criteria.
        Uses the same flex calculation as timecards.

        Use the `asOfDate` parameter to get historical flex balances for a specific date
        (e.g. `"2026-01-01"` for balances as of 1 January 2026). Without `asOfDate`, balances
        are calculated as of today.

        Supports pagination via `limit` (max 100, default 50) and `offset` query parameters.
      operationId: GetFlexBalanceTotals
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of employees to return per page (default 50, max 100)
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          required: false
          description: Number of employees to skip for pagination (default 0). Use with `limit` to page through results.
          schema:
            type: integer
            default: 0
        - name: sortBy
          in: query
          required: false
          description: Field to sort by
          schema:
            type: string
            enum:
              - name
            default: name
        - name: sortDirection
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filter
              properties:
                filter:
                  $ref: '#/components/schemas/BackendBoolExp'
                search:
                  type: string
                  description: Free text search for employee name
                  maxLength: 100
                asOfDate:
                  type: string
                  format: date
                  description: |
                    Calculate flex balance as of this date (YYYY-MM-DD). Defaults to today if not provided.
                    Use this to retrieve historical flex balances for reporting or payroll (e.g. end-of-year snapshots).
      responses:
        '200':
          description: List of flex balance totals with employee information
          content:
            application/json:
              schema:
                type: object
                required:
                  - totals
                  - totalCount
                  - aggregates
                properties:
                  totals:
                    type: array
                    items:
                      $ref: '#/components/schemas/flexTotalWithEmployee'
                  totalCount:
                    type: integer
                    description: Total number of employees matching the filter
                  aggregates:
                    type: object
                    description: Aggregate statistics for all employees matching the filter (not just the current page)
                    required:
                      - totalFlexMinutes
                      - averageFlexMinutes
                      - employeeCount
                    properties:
                      totalFlexMinutes:
                        type: integer
                        description: Sum of flex balance in minutes for all employees matching the filter
                      averageFlexMinutes:
                        type: number
                        format: float
                        description: Average flex balance in minutes for all employees matching the filter
                      employeeCount:
                        type: integer
                        description: Number of employees included in the aggregate calculation (employees with flex hours enabled)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
