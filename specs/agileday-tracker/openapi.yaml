          type: string
          format: uuid
        projectlikeId:
          type: string
          format: uuid
        createdAt:
          type: string
        updatedAt:
          type: string
        projectlikeName:
          type: string
        projectlikeType:
          type: string
          description: The type of the parent projectlike (INTERNAL, EXTERNAL, OPPORTUNITY, ABSENCE, IDLE). May be null if user doesn't have permission to view the projectlike details.
          nullable: true
          enum:
            - INTERNAL
            - EXTERNAL
            - OPPORTUNITY
            - ABSENCE
            - IDLE
        roleName:
          type: string
        externalId:
          type: string
          description: The external ID of the opening (e.g., from an external system or integration)
          example: EXT-12345
        externalProductId:
          type: string
          description: The external product ID of the opening (e.g., product or service ID from an external system)
          example: PROD-67890
        status:
          type: string
          description: The status of the opening (if staffing feature is enabled)
        allocationMode:
          type: string
          enum:
            - allocation
            - hours
            - workdays
          description: |
            The allocation mode determines how allocations are interpreted for this opening:

            - **allocation**: Percentage-based allocation (0-100%). The `allocation` field in each
              allocation record represents a percentage of working hours.
            - **hours**: Hour-based allocation. The `hours` field in each allocation record
              represents actual hours for the period.
            - **workdays**: Workday-based allocation.

            When creating or updating allocations via the V2 API:
            - Use `allocationValue` when mode is "allocation"
            - Use `hoursValue` when mode is "hours"
          example: allocation
        allocations:
          type: array
          description: |
            List of allocation records for this opening. Each record defines an allocation value
            starting from a specific date. The allocation applies from `startDate` until the
            next allocation's `startDate`.

            To represent a complete allocation period:
            1. Create an allocation with the desired value at the start date
            2. Create an allocation with value 0 at the day after the end date

            Example for a 100% allocation from 2025-04-09 to 2025-04-09:
            ```json
            [
              { "startDate": "2025-04-09", "allocation": 100 },
              { "startDate": "2025-04-10", "allocation": 0 }
            ]
            ```

            Example for 8 hours allocation from 2025-04-09 to 2025-04-09 (hours mode):
            ```json
            [
              { "startDate": "2025-04-09", "hours": 8 },
              { "startDate": "2025-04-10", "hours": 0 }
            ]
            ```
          items:
            $ref: '#/components/schemas/Allocation'
        interested:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeConnection'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/LabeledAsConnection'
        speculatees:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeWithRatesConnection'
        contractees:
          type: array
          items:
