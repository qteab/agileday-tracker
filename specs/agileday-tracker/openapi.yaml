      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        openToSubcontractors:
          type: boolean
          deprecated: true
          description: This field is deprecated and will be removed in the next version. Use the subcontractorVisibility field instead.
        subcontractorVisibility:
          $ref: '#/components/schemas/SubcontractorVisibility'
        billable:
          type: boolean
