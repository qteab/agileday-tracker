              description: The name of the region
        staffingManager:
          $ref: '#/components/schemas/EmployeeConnection'
          description: The staffing manager assigned to this opening
          nullable: true
        staffingTeam:
          type: array
          description: The staffing team members assigned to this opening
          items:
            $ref: '#/components/schemas/EmployeeConnection'
        commercialModel:
          type: string
          nullable: true
          enum:
            - TIME_MATERIALS
            - FIXED_PRICE
          description: The commercial model for the opening. If null, inherits from project.
