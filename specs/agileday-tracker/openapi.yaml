  /v1/team:
    get:
      tags:
        - Core Data:Teams
      summary: Get all Teams
      description: |
        Retrieve a list of teams with optional filtering, sorting, and pagination.

        **Filtering by timestamps:**
        - Use `createdAfter`/`createdBefore` to filter by creation date
        - Use `updatedAfter`/`updatedBefore` to filter by last update date
        - All timestamps should be in ISO 8601 format (e.g., 2024-01-15T10:30:00Z)

        **Sorting:**
        - Use `sortBy` to specify the field to sort by (createdAt, updatedAt, or name)
        - Use `sortDirection` to specify ascending (asc) or descending (desc) order

        **Pagination:**
        - Use `limit` to specify maximum number of results (default: 100, max: 1000)
        - Use `offset` to skip a number of results for pagination
      operationId: GetTeams
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/createdAfterOptionalParam'
        - $ref: '#/components/parameters/createdBeforeOptionalParam'
        - $ref: '#/components/parameters/updatedAfterOptionalParam'
        - $ref: '#/components/parameters/updatedBeforeOptionalParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortByOptionalParam'
        - $ref: '#/components/parameters/sortDirectionOptionalParam'
      responses:
        '200':
          description: Get all Teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Core Data:Teams
      summary: Create Team
      description: |
        Create a new team (organization unit of type TEAM).

        **Required:** `name` is the only required field.

        **Optional fields:** `externalId`, `description`, `startDate`, `endDate`. Dates must be strings in YYYY-MM-DD format.

        **Relationships:** Use the `relationships` array to link the team to addresses, leads, team members, or team offerings at creation time. Each relationship specifies:
        - `relationship`: One of `address`, `lead`, `teamMember`, `teamOffering`
        - `id` or `ids`: UUID(s) of the related entity (use `id` for single, `ids` for multiple)
        - `idField`: Usually `"id"` — the field to match against
        - `overwrite`: Replace existing relationships of this type
        - `ignoreMissing`: If true, skip missing IDs instead of failing

        **Example:** To create a team with a lead and team members, include `relationships` with `relationship: "lead"` (with `id`) and `relationship: "teamMember"` (with `ids` array).
      operationId: CreateTeam
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreate'
      responses:
        '200':
          description: Create Team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
