  /v2/allocation:
    put:
      tags:
        - Projects:Allocations
      summary: Apply an allocation to a time period
      description: |
        Applies an allocation to the specified time period. The allocation can either replace existing
        allocations in that time period (replaceExisting: true) or be inserted between them, splitting
        the existing allocations into separate parts (replaceExisting: false).

        ## Allocation Modes

        The opening/reservation has an `allocationMode` that determines how allocations are interpreted:

        ### Percentage Mode (`allocationMode: "allocation"`)
        Use `allocationValue` to set a percentage (0-100):
        ```json
        {
          "reservationId": "eb096ced-d6a3-4332-a22f-3db6a603880a",
          "startDate": "2025-04-09",
          "endDate": "2025-04-10",
          "allocationValue": 50,
          "replaceExisting": true
        }
        ```
        This sets 50% allocation for the specified period.

        ### Hours Mode (`allocationMode: "hours"`)
        Use `hoursValue` to set actual hours for the period:
        ```json
        {
          "reservationId": "eb096ced-d6a3-4332-a22f-3db6a603880a",
          "startDate": "2025-04-09",
          "endDate": "2025-04-10",
          "hoursValue": 8.0,
          "replaceExisting": true
        }
        ```
        This allocates 8 hours for the specified period. The hours are for the entire period,
        not per day. If the period spans multiple working days, the hours are distributed
        across those days.

        ## Examples

        ### Example 1: Set 100% allocation for a period (percentage mode)
        ```json
        {
          "reservationId": "eb096ced-d6a3-4332-a22f-3db6a603880a",
          "startDate": "2025-01-01",
          "endDate": "2025-06-01",
          "allocationValue": 100,
          "replaceExisting": true
        }
        ```

        ### Example 2: Set 8 hours allocation (hours mode)
        ```json
        {
          "reservationId": "eb096ced-d6a3-4332-a22f-3db6a603880a",
          "startDate": "2025-04-09",
          "endDate": "2025-04-10",
          "hoursValue": 8.0,
          "replaceExisting": true
        }
        ```

        ### Example 3: Insert a partial allocation without replacing existing
        ```json
        {
          "reservationId": "eb096ced-d6a3-4332-a22f-3db6a603880a",
          "startDate": "2025-03-01",
          "endDate": "2025-04-01",
          "allocationValue": 50,
          "replaceExisting": false
        }
        ```
        This inserts a 50% allocation, splitting any existing allocations at the boundaries.

        ### Example 4: Clear allocation for a period
        ```json
        {
          "reservationId": "eb096ced-d6a3-4332-a22f-3db6a603880a",
          "startDate": "2025-04-09",
          "endDate": "2025-04-10",
          "allocationValue": 0,
          "replaceExisting": true
        }
        ```
        Or for hours mode:
        ```json
        {
          "reservationId": "eb096ced-d6a3-4332-a22f-3db6a603880a",
          "startDate": "2025-04-09",
          "endDate": "2025-04-10",
          "hoursValue": 0,
          "replaceExisting": true
        }
        ```
      operationId: ApplyAllocationV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllocationRequestV2'
            examples:
              percentageAllocation:
                summary: Set percentage allocation (100%)
                description: Sets a full-time (100%) allocation for the specified period
                value:
                  reservationId: eb096ced-d6a3-4332-a22f-3db6a603880a
                  startDate: '2025-01-01'
                  endDate: '2025-06-01'
                  allocationValue: 100
                  replaceExisting: true
              hoursAllocation:
                summary: Set hours allocation (8 hours)
                description: Sets an 8-hour allocation for a single day (when allocationMode is "hours")
                value:
                  reservationId: eb096ced-d6a3-4332-a22f-3db6a603880a
                  startDate: '2025-04-09'
                  endDate: '2025-04-10'
                  hoursValue: 8
                  replaceExisting: true
              partialHoursAllocation:
                summary: Set partial hours allocation (4 hours)
                description: Sets a 4-hour allocation (half day) for a single day
                value:
                  reservationId: eb096ced-d6a3-4332-a22f-3db6a603880a
                  startDate: '2025-04-09'
                  endDate: '2025-04-10'
                  hoursValue: 4
                  replaceExisting: true
              insertAllocation:
                summary: Insert allocation without replacing
                description: Inserts a new allocation, splitting existing allocations at boundaries
                value:
                  reservationId: eb096ced-d6a3-4332-a22f-3db6a603880a
                  startDate: '2025-03-01'
                  endDate: '2025-04-01'
                  allocationValue: 50
                  replaceExisting: false
      responses:
        '200':
          description: Allocation applied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocationResponseV2'
              examples:
                percentageResponse:
                  summary: Response for percentage allocation
                  value:
                    id: eb096ced-d6a3-4332-a22f-3db6a603880a
                    intervalType: month
                    startDate: '2025-01-01'
                    endDate: '2025-06-01'
                    allocations:
                      2025-01:
                        allocation: 100
                        hours: 168
                        probability: 100
                        weighted: 100
                        weightedHours: 168
                      2025-02:
                        allocation: 100
                        hours: 160
                        probability: 100
                        weighted: 100
                        weightedHours: 160
                    projectlikeId: da2a1fa2-e817-4f11-861d-22704c4224be
                    contracteeId: 106b074e-1e5f-4c15-bc24-d9c03bd9eb9f
                hoursResponse:
                  summary: Response for hours allocation
                  description: Note that 'allocation' field shows calculated percentage based on working hours
                  value:
                    id: eb096ced-d6a3-4332-a22f-3db6a603880a
                    intervalType: month
                    startDate: '2025-04-01'
                    endDate: '2025-04-30'
                    allocations:
                      2025-04:
                        allocation: 4.76
                        hours: 8
                        probability: 100
                        weighted: 4.76
                        weightedHours: 8
                    projectlikeId: da2a1fa2-e817-4f11-861d-22704c4224be
                    contracteeId: 106b074e-1e5f-4c15-bc24-d9c03bd9eb9f
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
