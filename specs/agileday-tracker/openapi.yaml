      summary: Get all openings
      operationId: GetOpeningsV2
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - name: sortBy
          in: query
          required: false
          description: The field to sort the openings by. Default is createdAt
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
              - startDate
              - endDate
        - name: orderBy
          in: query
          required: false
          description: The order to sort the openings by. Default is asc
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: filter
          in: query
          required: false
          description: |
            Advanced filter expression for filtering openings.
            Should be provided as a JSON string.

            Supported filter fields:
            - role, seniority, skill, company, customer, businessUnit, label, staffingLabel, region, staffingManager, projectlike
            - team, primaryTeam, parentTeam
            - candidate, interested, matchingSkillsEmployee, matchingRolesEmployee
            - candidateCount, contracteeCount, speculateeCount
            - status, workType, startDate, endDate, deadline, probability, searchText
            - mergeTargetReservationId

            Supported operators:
            - in: filter by multiple IDs, e.g. {"role":{"in":["uuid1","uuid2"]}}
            - equals, not_equals: exact match, e.g. {"status":{"equals":"open"}}
            - contains, not_contains: substring match, e.g. {"role":{"name":{"contains":"dev"}}}
            - starts_with, ends_with: prefix/suffix match, e.g. {"role":{"name":{"starts_with":"Senior"}}}
            - is_empty, is_not_empty: null checks
            - greater_than, less_than, greater_than_equal, less_than_equal: for dates/numbers
            - between: date range filter, e.g. {"deadline":{"between":["2026-01-14","2026-01-21"]}}

            Logical operators:
            - and: combine conditions, e.g. {"and":[{"role":{"in":[...]}},{"seniority":{"in":[...]}}]}
            - or: alternative conditions
          schema:
            type: string
          example: '{"role":{"in":["uuid1","uuid2"]},"searchText":{"contains":"developer"}}'
        - name: includeLost
          in: query
          required: false
          description: When true, includes lost openings in the results. Default is false (lost openings excluded).
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  openings:
