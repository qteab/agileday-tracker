    SubcontractorVisibility:
      type: string
      enum:
        - HIDDEN
        - ALL
        - PARTNER
        - SELECTED_PARTNER
        - SUBCONTRACTOR
      description: |
        These only apply to partner companies and subcontractors. Difference Between visibility options HIDDEN: The opening is hidden from partner companies and subcontractors. ALL: The opening is visible to all companies and subcontractors. PARTNER: The opening is visible to all partner companies. SELECTED_PARTNER: The opening is visible to selected partner companies. Look reservationVisibleCompanies. SUBCONTRACTOR: The opening is visible to all subcontractors which are not in partner companies.
    AllocationRequestV2:
      type: object
      required:
        - reservationId
        - startDate
        - endDate
      properties:
        reservationId:
          type: string
          format: uuid
          description: |
            The ID of the reservation (opening) to allocate. This is the same as the opening ID.
            The reservation's `allocationMode` determines whether to use `allocationValue` or `hoursValue`.
          example: eb096ced-d6a3-4332-a22f-3db6a603880a
        startDate:
          type: string
          format: date
          description: |
            Start date of the allocation period (inclusive).
            Format: YYYY-MM-DD
          example: '2025-04-09'
        endDate:
          type: string
          format: date
          description: |
            End date of the allocation period (exclusive - the day after the last allocated day).
            For a single day allocation on 2025-04-09, set endDate to 2025-04-10.
            Format: YYYY-MM-DD
          example: '2025-04-10'
        allocationValue:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: |
            Allocation percentage (0-100). Use this when the opening's `allocationMode` is "allocation".

            - 100 = full-time allocation
            - 50 = half-time allocation
            - 37.5 = fractional allocation (e.g. calculated from workdays/hours)
            - 0 = no allocation (clears the allocation for the period)

            **Note**: Either `allocationValue` or `hoursValue` must be provided, but not both.
          example: 100
        hoursValue:
          type: number
          format: double
          minimum: 0
          description: |
            Hours to allocate for the period. Use this when the opening's `allocationMode` is "hours".

            This is the **total hours for the entire period**, not hours per day.
            For example, to allocate 8 hours for a single day, set `hoursValue: 8.0`.
            To allocate 8 hours per day for a 5-day period, set `hoursValue: 40.0`.

            **Note**: Either `allocationValue` or `hoursValue` must be provided, but not both.
          example: 8
        replaceExisting:
          type: boolean
          default: false
          description: |
            Controls how the new allocation interacts with existing allocations:

            - **true**: Deletes all existing allocations for this reservation and creates new ones
              for the specified period. Use this when setting up initial allocations or when you
              want to completely replace the allocation schedule.

            - **false**: Inserts the new allocation between existing ones, splitting them at the
              boundaries. Existing allocations outside the specified period are preserved.
              Use this when you want to modify a specific time period without affecting others.
          example: true
        intervalType:
          type: string
          enum:
            - week
            - month
          default: month
          description: |
            The interval type for grouping allocations in the response.

            - **month**: Allocations are grouped by calendar month
            - **week**: Allocations are grouped by calendar week

            This affects how the `allocations` object in the response is structured.
          example: month
    AllocationResponseV2:
      type: object
      description: |
        Response containing the updated allocation information for the reservation.
        The `allocations` object contains allocation data grouped by the specified interval type.
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the reservation (opening)
          example: eb096ced-d6a3-4332-a22f-3db6a603880a
        intervalType:
          type: string
          enum:
            - week
            - month
          description: The interval type used for grouping allocations
          example: month
        startDate:
          type: string
          format: date
          description: The start date of the allocation range
          example: '2025-04-09'
        endDate:
          type: string
          format: date
          description: The end date of the allocation range
          example: '2025-04-10'
        allocations:
          type: object
          description: |
            Allocation data grouped by interval (month or week).
            Keys are interval identifiers (e.g., "2025-04" for month, "2025-W15" for week).
          additionalProperties:
            $ref: '#/components/schemas/AllocationInterval'
          example:
            2025-04:
              allocation: 100
              hours: 168
              probability: 100
              weighted: 100
              weightedHours: 168
        projectlikeId:
          type: string
          format: uuid
          description: The ID of the project or projectlike entity this reservation belongs to
          example: da2a1fa2-e817-4f11-861d-22704c4224be
        contracteeId:
          type: string
          format: uuid
          description: The ID of the employee assigned (contracted) to this reservation
          example: 106b074e-1e5f-4c15-bc24-d9c03bd9eb9f
        speculateeIds:
          type: array
          description: IDs of employees being considered (speculated) for this reservation
          items:
            type: string
            format: uuid
          example: []
    AllocationInterval:
      type: object
      description: |
        Allocation data for a specific interval (month or week).

        **Important**: When `allocationMode` is "hours", the `allocation` field represents
        a calculated percentage based on working hours in that interval, not the input value.
      properties:
        allocation:
          type: number
          format: float
          description: |
            Allocation percentage for this interval.

            - When `allocationMode` is "allocation": This is the set percentage (0-100)
            - When `allocationMode` is "hours": This is a **calculated** percentage based on
              (hours / total working hours in interval) * 100
          example: 100
        hours:
          type: number
          format: float
          description: |
            Total allocated hours for this interval.

            - When `allocationMode` is "allocation": Calculated as (allocation% / 100) * working hours
            - When `allocationMode` is "hours": The actual hours allocated
          example: 168
        probability:
          type: number
          format: float
          description: |
            Probability percentage for this allocation (from the opening's probability field).
            Used for weighted calculations in forecasting.
          example: 100
        weighted:
          type: number
          format: float
          description: |
            Weighted allocation percentage: (allocation * probability / 100)
          example: 100
        weightedHours:
          type: number
          format: float
          description: |
            Weighted hours: (hours * probability / 100)
          example: 168
