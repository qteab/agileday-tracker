  /v1/reporting/allocation:
    get:
      tags:
        - Reporting:Allocation Reporting
      summary: Get all allocations with financial data from materialized view
      description: |
        Retrieve allocation financial data for a specified date range, including both historical and future allocations.
        This reporting API returns data that is precalculated by night time background job. So the data is behind one day.
        Allocations in the past will be updated for the last 6 months. Future allocations are refreshed up to 2 years ahead.

        **Date Range Behavior:**
        - `startDate`: INCLUSIVE - data from this date is included in results
        - `endDate`: EXCLUSIVE - data from this date is NOT included in results

        **Date Range Limit:**
        - The limit is three months

        **Examples:**
        - To get data for a single day: startDate=2025-01-15, endDate=2025-01-16
        - To get Q1 2025 data: startDate=2025-01-01, endDate=2025-04-01

        **Filtering:**
        Filters are combined using AND logic (all conditions must be met). Filters are optional.

          - employeeId
          - employeeExternalId
          - employeeEmail
          - projectId
          - projectExternalId
          - teamId
          - teamExternalId
          - businessUnitId
          - businessUnitExternalId
          - companyId
          - companyExternalId
          - customerId
          - customerExternalId
      operationId: GetAllocationsWithFinancials
      parameters:
        - $ref: '#/components/parameters/startDateParam'
        - $ref: '#/components/parameters/endDateParam'
        - $ref: '#/components/parameters/employeeIdOptionalParam'
        - $ref: '#/components/parameters/employeeExternalIdOptionalParam'
        - $ref: '#/components/parameters/employeeEmailOptionalParam'
        - $ref: '#/components/parameters/projectIdOptionalParam'
        - $ref: '#/components/parameters/projectExternalIdOptionalParam'
        - $ref: '#/components/parameters/teamIdOptionalParam'
        - $ref: '#/components/parameters/teamExternalIdOptionalParam'
        - $ref: '#/components/parameters/businessUnitIdOptionalParam'
        - $ref: '#/components/parameters/businessUnitExternalIdOptionalParam'
        - $ref: '#/components/parameters/companyIdOptionalParam'
        - $ref: '#/components/parameters/companyExternalIdOptionalParam'
        - $ref: '#/components/parameters/customerIdOptionalParam'
        - $ref: '#/components/parameters/customerExternalIdOptionalParam'
      responses:
