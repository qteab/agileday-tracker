  /v1/timesheets/by-employee/month/{month}:
    post:
      tags:
        - Time Tracking:Timesheets
      summary: Get timesheets by employee for a month
      description: |
        Retrieve employee timesheets for a given month or date range, with optional filtering by employee, project, or customer.

        Each timesheet represents one employee's time reporting for a specific week within the requested month(s). The response includes the total reported minutes, timesheet status, freeze information, and week-level freeze schedules.

        **Date handling:**
        - The `month` path parameter is truncated to the first day of the month (e.g. `2025-01-15` becomes `2025-01-01`).
        - If `endMonth` is provided, timesheets for all months in the range are returned (inclusive).

        **Pagination:**
        - Use `limit` and `offset` query parameters to paginate results.
        - Default page size is 25, maximum is 100.

        **Filtering:**
        - Use the `filter` field to filter by employee ID.
        - Use the `mode` and `uuids` fields together to filter by employee, project, or customer UUID.
        - These filters can be combined.

        **Permissions:**
        - Results are filtered based on the authenticated user's role and project access. Users only see timesheets they have permission to view.
      operationId: GetTimecardsByEmployeeMonth
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: path
          required: true
          description: |
            Start month in YYYY-MM-DD format. Any day of the month is accepted; it will be truncated to the first day of the month.
          schema:
            type: string
            format: date
            example: '2025-01-01'
        - name: limit
          in: query
          required: false
          description: Maximum number of employee timesheets to return per page. Must be between 1 and 100.
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
            example: 25
        - name: offset
          in: query
          required: false
          description: Number of results to skip for pagination. Use together with `limit` to page through results.
          schema:
            type: integer
            default: 0
            minimum: 0
            example: 0
        - name: endMonth
          in: query
          required: false
          description: |
            End month in YYYY-MM-DD format (inclusive). Any day of the month is accepted; it will be truncated to the first day of the month. If omitted, only the `month` specified in the path is returned. Must be greater than or equal to `month`.
          schema:
            type: string
            format: date
            example: '2025-03-01'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
                - filter
              properties:
                text:
                  type: string
                  description: |
                    Free text search query to match against employee names. Pass an empty string `""` to skip text search and return all employees (subject to filters).
                  maxLength: 100
                  example: ''
                filter:
                  description: |
                    Boolean filter expression for filtering results. Currently supports filtering by employee ID using the `in` operator.

                    **Structure:** An object where keys are field names and values are comparison expressions. A comparison expression is an object where keys are operators and values are the comparison values.

                    **Supported fields:**
                    - `id` — Employee UUID

                    **Supported operators:**
                    - `in` — Matches any of the provided values (array of UUIDs)

                    **Logical operators** (for combining multiple conditions):
                    - `_and` — All conditions must match (array of filter expressions)
                    - `_or` — At least one condition must match (array of filter expressions)

                    Pass an empty object `{}` to skip filtering and return all results.
                  allOf:
                    - $ref: '#/components/schemas/BackendBoolExp'
                  example:
                    id:
                      in:
                        - a1b2c3d4-e5f6-7890-abcd-ef1234567890
                        - b2c3d4e5-f6a7-8901-bcde-f12345678901
                mode:
                  type: string
                  enum:
                    - all
                    - employee
                    - project
                    - customer
                  default: all
                  description: |
                    Determines how the `uuids` array is interpreted for filtering:
                    - `all` — No UUID-based filtering; the `uuids` field is ignored.
                    - `employee` — Filter timesheets to only include the specified employee UUIDs.
                    - `project` — Filter timesheets to only include employees who have reported time on the specified project UUIDs.
                    - `customer` — Filter timesheets to only include employees who have reported time on projects belonging to the specified customer UUIDs.
                  example: all
                uuids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: |
                    Array of UUIDs to filter by. How these UUIDs are interpreted depends on the `mode` field. Ignored when `mode` is `all`.
                  example: []
            examples:
              allTimecards:
                summary: Get all timesheets for a month
                description: Returns all timesheets for January 2025 with no filtering applied.
                value:
                  text: ''
                  filter: {}
              filterByEmployeeIds:
                summary: Filter by specific employee IDs
                description: Returns timesheets only for the two specified employees.
                value:
                  text: ''
                  filter:
                    id:
                      in:
                        - a1b2c3d4-e5f6-7890-abcd-ef1234567890
                        - b2c3d4e5-f6a7-8901-bcde-f12345678901
              textSearch:
                summary: Search employees by name
                description: Returns timesheets for employees matching the search text "John".
                value:
                  text: John
                  filter: {}
              filterByProject:
                summary: Filter by project
                description: Returns timesheets for employees who have reported time on a specific project.
                value:
                  text: ''
                  filter: {}
                  mode: project
                  uuids:
                    - c3d4e5f6-a7b8-9012-cdef-123456789012
              filterByCustomer:
                summary: Filter by customer
                description: Returns timesheets for employees who have reported time on projects belonging to a specific customer.
                value:
                  text: ''
                  filter: {}
                  mode: customer
                  uuids:
                    - d4e5f6a7-b8c9-0123-defa-234567890123
              combinedFilters:
                summary: Combine text search with employee filter
                description: Search for employees named "Jane" among a specific set of employee IDs.
                value:
                  text: Jane
                  filter:
                    id:
                      in:
                        - a1b2c3d4-e5f6-7890-abcd-ef1234567890
                        - b2c3d4e5-f6a7-8901-bcde-f12345678901
              filterByEmployeeMode:
                summary: Filter by employee using mode + uuids
                description: Alternative way to filter by employee using the mode and uuids fields instead of the filter object.
                value:
                  text: ''
                  filter: {}
                  mode: employee
                  uuids:
                    - a1b2c3d4-e5f6-7890-abcd-ef1234567890
      responses:
        '200':
          description: Timesheets matching the search criteria with freeze information.
          content:
            application/json:
              schema:
                type: object
                required:
                  - freezeInterval
                  - weekFreezeInfo
                  - timecards
                properties:
                  freezeInterval:
                    $ref: '#/components/schemas/FreezeInterval'
                    description: |
                      The organization's freeze interval setting. Determines whether timesheets are frozen on a weekly or monthly basis.
                  weekFreezeInfo:
                    type: array
                    description: |
                      Freeze schedule for each week in the requested date range. Each entry contains the week's start date and when that week will be frozen.
                      - For monthly freeze: all weeks in the same month share the same `freezesAt` date.
                      - For weekly freeze: each week has its own `freezesAt` date.
                      - `freezesAt` is `null` when no freeze settings are configured.
                    items:
                      $ref: '#/components/schemas/WeekFreezeInfo'
                  timecards:
                    type: array
                    description: |
                      Array of employee timesheets. Each timesheet represents one employee's time reporting for a specific week. An employee may appear multiple times if the date range spans multiple weeks.
                    items:
                      $ref: '#/components/schemas/FullTimecardsResponse'
              example:
                freezeInterval: month
                weekFreezeInfo:
                  - week: '2024-12-30'
                    freezesAt: '2025-02-14T22:00:00Z'
                  - week: '2025-01-06'
                    freezesAt: '2025-02-14T22:00:00Z'
                  - week: '2025-01-13'
                    freezesAt: '2025-02-14T22:00:00Z'
                  - week: '2025-01-20'
                    freezesAt: '2025-02-14T22:00:00Z'
                  - week: '2025-01-27'
                    freezesAt: '2025-02-14T22:00:00Z'
                timecards:
                  - id: f1e2d3c4-b5a6-7890-1234-567890abcdef
                    employeeId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    week: '2024-12-30'
                    month: '2025-01-01'
                    minutes: 2400
                    status: SUBMITTED
                    frozenAt: null
                    unfrozenUntil: null
                    updatedAt: '2025-01-10T14:30:00Z'
                    createdAt: '2025-01-06T08:00:00Z'
                  - id: e2d3c4b5-a6f7-8901-2345-67890abcdef1
                    employeeId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    week: '2025-01-06'
                    month: '2025-01-01'
                    minutes: 2400
                    status: SAVED
                    frozenAt: null
                    unfrozenUntil: null
                    updatedAt: '2025-01-12T09:15:00Z'
                    createdAt: '2025-01-06T08:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/workpackages/{countryCode}/holidays:
    get:
      summary: Get enabled holidays for a country within date range
      description: |
        Returns all holidays that are currently enabled for the given country within the specified date range.
        The result merges standard public holidays (those enabled via holiday settings) and custom company holidays (work pattern holidays).
        Only holidays on or after 2026-01-01 are supported.

        The `endDate` is exclusive. To include holidays on a specific last day, set `endDate` to the day after.

        Used internally to determine non-working days for flex balance and allocation working-day calculations.
      operationId: getHolidays
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
        - name: startDate
          in: query
          required: true
          description: Start date of the range (inclusive)
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          description: End date of the range (exclusive)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of enabled holidays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicHoliday'
              example:
                - date: '2026-01-01'
                  name: New Year's Day
                - date: '2026-04-03'
                  name: Good Friday
                - date: '2026-12-25'
                  name: Christmas Day
                - date: '2026-06-19'
                  name: Company Anniversary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /v1/workpackages/{countryCode}/holidays/available:
    get:
      summary: Get all available holidays for a country
      description: |
        Returns the full catalogue of public holidays recognised for the given country, each with its current enabled/disabled status.
        Use this endpoint to populate the holiday settings UI — it shows which holidays exist and whether they are currently counted as non-working days.

        The optional `year` parameter controls which calendar year is used to generate the `sampleDate` field on each holiday entry (useful for displaying example dates to users). Defaults to the current year.
      operationId: getAvailableHolidays
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
        - name: year
          in: query
          description: Year to get sample dates for (defaults to current year)
          schema:
            type: integer
      responses:
        '200':
          description: List of all available holidays with their settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailableHoliday'
              example:
                - reference: New Year's Day
                  description: Uudenvuodenpäivä
                  authority: national
                  dayOff: true
                  sampleDate: '2026-01-01'
                  enabled: true
                - reference: Epiphany
                  description: Loppiainen
                  authority: national
                  dayOff: true
                  sampleDate: '2026-01-06'
                  enabled: true
                - reference: Good Friday
                  description: Pitkäperjantai
                  authority: national
                  dayOff: true
                  sampleDate: '2026-04-03'
                  enabled: true
                - reference: Easter Sunday
                  description: Pääsiäinen
                  authority: national
                  dayOff: true
                  sampleDate: '2026-04-05'
                  enabled: false
                - reference: Christmas Day
                  description: Jouluaatto
                  authority: national
                  dayOff: true
                  sampleDate: '2026-12-25'
                  enabled: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /v1/workpackages/{countryCode}/holidays/settings:
    get:
      summary: Get holiday settings for a country
      description: |
        Returns the persisted enable/disable settings for each public holiday in the given country.
        A setting record is only present for holidays that have been explicitly configured; holidays without a setting record fall back to their default enabled state.

        Prefer `GET .../holidays/available` when you need to display the holiday catalogue in a UI — it combines the setting state with descriptive metadata in one call.
      operationId: getCountryHolidaySettings
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
      responses:
        '200':
          description: List of holiday settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryHolidaySettingsResponse'
              example:
                data:
                  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    countryId: FI
                    holidayReference: Easter Sunday
                    enabled: false
                    createdAt: '2026-01-10T09:00:00Z'
                    updatedAt: '2026-01-10T09:00:00Z'
                  - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                    countryId: FI
                    holidayReference: Ascension Day
                    enabled: false
                    createdAt: '2026-01-10T09:00:00Z'
                    updatedAt: '2026-03-15T14:22:00Z'
                total: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
    put:
      summary: Batch update holiday settings
      description: |
        Enables or disables multiple public holidays in a single request for the given country.
        Each item in the request body references a holiday by its `holidayReference` string (e.g. `"Christmas Day"`) and sets it to `enabled: true` or `false`.

        Settings are upserted — existing records are updated and missing ones are created.
        Holidays not included in the request are left unchanged.

        Changes take effect immediately and affect all working-day calculations (flex balances, allocations) from 2026-01-01 onwards.
      operationId: batchUpsertCountryHolidaySettings
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUpdateHolidaySettingsRequest'
            examples:
              disableObservances:
                summary: Disable observance holidays, keep national ones enabled
                value:
                  settings:
                    - holidayReference: Easter Sunday
                      enabled: false
                    - holidayReference: Whit Sunday
                      enabled: false
                    - holidayReference: Christmas Day
                      enabled: true
              enableAll:
                summary: Enable a set of holidays
                value:
                  settings:
                    - holidayReference: New Year's Day
                      enabled: true
                    - holidayReference: Good Friday
                      enabled: true
                    - holidayReference: Midsummer Day
                      enabled: true
      responses:
        '200':
          description: Holiday settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryHolidaySettingsResponse'
              example:
                data:
                  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    countryId: FI
                    holidayReference: Easter Sunday
                    enabled: false
                    createdAt: '2026-01-10T09:00:00Z'
                    updatedAt: '2026-06-01T11:30:00Z'
                  - id: c3d4e5f6-a7b8-9012-cdef-123456789012
                    countryId: FI
                    holidayReference: Whit Sunday
                    enabled: false
                    createdAt: '2026-06-01T11:30:00Z'
                    updatedAt: '2026-06-01T11:30:00Z'
                  - id: d4e5f6a7-b8c9-0123-defa-234567890123
                    countryId: FI
                    holidayReference: Christmas Day
                    enabled: true
                    createdAt: '2026-06-01T11:30:00Z'
                    updatedAt: '2026-06-01T11:30:00Z'
                total: 3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /v1/workpackages/{countryCode}/holidays/settings/{holidayReference}:
    put:
      summary: Update a holiday setting
      description: |
        Enables or disables a single public holiday for the given country.
        Use this endpoint when toggling one holiday at a time; use `PUT .../holidays/settings` for bulk changes.

        The `holidayReference` path parameter is the English identifier of the holiday as returned in the `reference` field of the available-holidays response (e.g. `Christmas%20Day`).
      operationId: upsertCountryHolidaySetting
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
        - name: holidayReference
          in: path
          required: true
          description: Holiday reference identifier (e.g., "Christmas Day", "New Year's Day")
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHolidaySettingRequest'
            examples:
              disable:
                summary: Disable a holiday
                value:
                  enabled: false
              enable:
                summary: Enable a holiday
                value:
                  enabled: true
      responses:
        '200':
          description: Holiday setting updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryHolidaySetting'
              example:
                id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                countryId: FI
                holidayReference: Easter Sunday
                enabled: false
                createdAt: '2026-01-10T09:00:00Z'
                updatedAt: '2026-06-01T11:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /v1/workpackages/{countryCode}/work-pattern-holidays:
    get:
      summary: List work pattern holidays for a country
      description: |
        Returns all custom company holidays (work pattern holidays) defined for the given country.
        These are organisation-specific non-working days added on top of the standard public holiday calendar — for example a company anniversary or a local office closure.

        Use the optional `year` query parameter to filter results to a specific calendar year.
      operationId: getWorkPatternHolidays
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
        - name: year
          in: query
          description: Filter by year
          schema:
            type: integer
      responses:
        '200':
          description: List of work pattern holidays
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkPatternHolidaysResponse'
              example:
                data:
                  - id: e5f6a7b8-c9d0-1234-efab-345678901234
                    countryId: FI
                    date: '2026-06-19'
                    name: Company Anniversary
                    createdAt: '2026-01-15T10:00:00Z'
                    updatedAt: '2026-01-15T10:00:00Z'
                  - id: f6a7b8c9-d0e1-2345-fabc-456789012345
                    countryId: FI
                    date: '2026-12-24'
                    name: Helsinki Office Closure
                    createdAt: '2026-03-01T08:30:00Z'
                    updatedAt: '2026-03-01T08:30:00Z'
                total: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
    post:
      summary: Create a work pattern holiday
      description: |
        Adds a custom company holiday for the given country. The date must be 2026-01-01 or later.
        Returns 409 if a work pattern holiday already exists on the same date for that country.

        Once created, the date is treated as a non-working day in all flex balance and allocation calculations for the country.
      operationId: createWorkPatternHoliday
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkPatternHolidayRequest'
            examples:
              companyAnniversary:
                summary: Add a company anniversary as a day off
                value:
                  date: '2026-06-19'
                  name: Company Anniversary
              officeClosure:
                summary: Add a local office closure
                value:
                  date: '2026-12-24'
                  name: Helsinki Office Closure
      responses:
        '201':
          description: Work pattern holiday created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkPatternHoliday'
              example:
                id: e5f6a7b8-c9d0-1234-efab-345678901234
                countryId: FI
                date: '2026-06-19'
                name: Company Anniversary
                createdAt: '2026-01-15T10:00:00Z'
                updatedAt: '2026-01-15T10:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: A work pattern holiday already exists for this date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /v1/workpackages/{countryCode}/work-pattern-holidays/{workPatternHolidayId}:
    get:
      summary: Get a work pattern holiday by ID
      description: |
        Returns the details of a single custom company holiday identified by its UUID.
      operationId: getWorkPatternHolidayById
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
        - $ref: '#/components/parameters/workPatternHolidayIdPath'
      responses:
        '200':
          description: Work pattern holiday details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkPatternHoliday'
              example:
                id: e5f6a7b8-c9d0-1234-efab-345678901234
                countryId: FI
                date: '2026-06-19'
                name: Company Anniversary
                createdAt: '2026-01-15T10:00:00Z'
                updatedAt: '2026-01-15T10:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
    put:
      summary: Update a work pattern holiday
      description: |
        Updates the date and/or name of an existing custom company holiday.
        The new date must be 2026-01-01 or later. Returns 409 if another work pattern holiday already exists on the target date for that country.
      operationId: updateWorkPatternHoliday
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
        - $ref: '#/components/parameters/workPatternHolidayIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkPatternHolidayRequest'
            examples:
              rename:
                summary: Rename the holiday
                value:
                  name: Founders Day
              reschedule:
                summary: Move to a different date
                value:
                  date: '2026-06-20'
              renameAndReschedule:
                summary: Update both name and date
                value:
                  date: '2026-06-20'
                  name: Founders Day
      responses:
        '200':
          description: Work pattern holiday updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkPatternHoliday'
              example:
                id: e5f6a7b8-c9d0-1234-efab-345678901234
                countryId: FI
                date: '2026-06-20'
                name: Founders Day
                createdAt: '2026-01-15T10:00:00Z'
                updatedAt: '2026-06-01T14:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: A work pattern holiday already exists for this date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
    delete:
      summary: Delete a work pattern holiday
      description: |
        Permanently removes a custom company holiday. Once deleted, the date is no longer treated as a non-working day for the country.
        This action cannot be undone.
      operationId: deleteWorkPatternHoliday
      tags:
        - Core Data:Work Packages
      parameters:
        - $ref: '#/components/parameters/countryCodePath'
        - $ref: '#/components/parameters/workPatternHolidayIdPath'
      responses:
        '204':
          description: Work pattern holiday deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    VisaInfo:
      type: object
      properties:
        visaType:
          type: string
          description: The category of visa held (Business, Work, Dependent, etc.)
          nullable: false
        visaStatus:
          type: string
          description: Current state of the visa (Active, Pending, Expired)
          nullable: false
        visaIdNumber:
          type: string
          description: The unique identifier for the visa
          nullable: true
        visaExpiryDate:
          type: string
          format: date
          description: When the visa will expire
          nullable: true
      required:
        - visaType
        - visaStatus
    WorkPermitInfo:
      type: object
      properties:
        workPermitType:
          type: string
          description: Category of work authorization (Temporary, Permanent, etc.)
          nullable: false
        workPermitStatus:
          type: string
          description: Current state of the work permit
          nullable: false
        workPermitIdNumber:
          type: string
          description: The unique identifier for the work permit
          nullable: true
        workPermitExpiryDate:
          type: string
          format: date
          description: When the work permit will expire
          nullable: true
      required:
        - workPermitType
        - workPermitStatus
    AbroadInfo:
      type: object
      properties:
        employeeId:
          type: string
          format: uuid
          nullable: false
        homeCountry:
          type: string
          description: Employee's country of origin/permanent residence
          nullable: true
        hostCountry:
          type: string
          description: Country where the employee is currently working
          nullable: true
        assignmentStartDate:
          type: string
          format: date
          description: Start date of the international assignment
          nullable: true
        assignmentEndDate:
          type: string
          format: date
          description: End date of the international assignment
          nullable: true
        notes:
          type: string
          description: Additional notes about the assignment
          nullable: true
        visaInfo:
          $ref: '#/components/schemas/VisaInfo'
          nullable: true
        workPermitInfo:
          $ref: '#/components/schemas/WorkPermitInfo'
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: false
        updatedAt:
          type: string
          format: date-time
          nullable: false
      required:
        - employeeId
        - homeCountry
        - hostCountry
        - assignmentStartDate
        - createdAt
        - updatedAt
    VisaInfoUpdateRequest:
      type: object
      properties:
        visaType:
          type: string
          description: The category of visa held (Business, Work, Dependent, etc.)
          nullable: true
        visaStatus:
          type: string
          description: Current state of the visa (Active, Pending, Expired)
          nullable: true
        visaIdNumber:
          type: string
          description: The unique identifier for the visa
          nullable: true
        visaExpiryDate:
          type: string
          format: date
          description: When the visa will expire
          nullable: true
    WorkPermitInfoUpdateRequest:
      type: object
      properties:
        workPermitType:
          type: string
          description: Category of work authorization (Temporary, Permanent, etc.)
          nullable: true
        workPermitStatus:
          type: string
          description: Current state of the work permit
          nullable: true
        workPermitIdNumber:
          type: string
          description: The unique identifier for the work permit
          nullable: true
        workPermitExpiryDate:
          type: string
          format: date
          description: When the work permit will expire
          nullable: true
    AbroadInfoUpdateRequest:
      type: object
      properties:
        homeCountry:
          type: string
          description: Employee's country of origin/permanent residence
          nullable: true
        hostCountry:
          type: string
          description: Country where the employee is currently working
          nullable: true
        assignmentStartDate:
          type: string
          format: date
          description: Start date of the international assignment
          nullable: true
        assignmentEndDate:
          type: string
          format: date
          description: End date of the international assignment
          nullable: true
        notes:
          type: string
          description: Additional notes about the assignment
          nullable: true
        visaInfo:
          $ref: '#/components/schemas/VisaInfoUpdateRequest'
          nullable: true
        workPermitInfo:
          $ref: '#/components/schemas/WorkPermitInfoUpdateRequest'
          nullable: true
    AbsenceRequestComment:
      type: object
      required:
        - id
        - authorId
        - authorName
        - comment
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the comment
        authorId:
          type: string
          format: uuid
          description: The ID of the comment author
        authorName:
          type: string
          description: The name of the comment author
        authorAvatarFileId:
          type: string
          format: uuid
          description: The ID of the author's avatar file
        comment:
          type: string
          description: The comment text
        createdAt:
          type: string
          format: date-time
          description: When the comment was created
        updatedAt:
          type: string
          format: date-time
          description: When the comment was last updated
    AbsenceRequestResponseData:
      allOf:
        - $ref: '#/components/schemas/AbsenceRequestBase'
        - type: object
          required:
            - reservationId
            - employeeName
            - absenceTypeName
            - workingDays
            - status
            - canApprove
            - allocationMode
          properties:
            reservationId:
              type: string
              format: uuid
              description: The ID of the reservation
            employeeName:
              type: string
              description: The name of the employee who is requesting the absence
            employeeAvatarFileId:
              type: string
              format: uuid
              description: The ID of the employee's avatar file
            absenceTypeName:
              type: string
              description: The name of the absence type (from the absence project)
            approverId:
              type: string
              format: uuid
              description: The ID of the approver (employee's supervisor)
            approverName:
              type: string
              description: The name of the approver (employee's supervisor)
            approverAvatarFileId:
              type: string
              format: uuid
              description: The ID of the approver's avatar file
            workingDays:
              type: integer
              format: int32
              description: The number of working days in the absence period
            status:
              type: string
              enum:
                - pending
                - approved
                - changes_requested
              description: The status of the absence request
            canApprove:
              type: boolean
              description: Whether the current user can approve this absence request
            comments:
              type: array
              description: All comments on this absence request
              items:
                $ref: '#/components/schemas/AbsenceRequestComment'
    AbsenceRequestBase:
      type: object
      required:
        - employeeId
        - absenceId
        - startDate
        - endDate
        - allocationMode
      properties:
        employeeId:
          type: string
          format: uuid
          description: The ID of the employee who is requesting the absence
        absenceId:
          type: string
          format: uuid
          description: The ID of the absence request
        startDate:
          type: string
          format: date
          description: The start date of the absence request
        endDate:
          type: string
          format: date
          description: The end date of the absence request
        allocation:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          description: The allocation percentage (1-100) of the absence request. Required when allocationMode is 'allocation'
        hours:
          type: number
          format: float
          minimum: 0
          description: The hours allocated for the absence request. Required when allocationMode is 'hours'
        allocationMode:
          type: string
          enum:
            - allocation
            - hours
          description: The allocation mode of the absence request
        description:
          type: string
          maxLength: 10000
          description: The description of the absence request
        comment:
          type: string
          maxLength: 10000
          description: Optional comment from the employee when creating the absence request
    PaginationInfo:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Number of items per page
        totalPages:
          type: integer
          description: Total number of pages
        totalItems:
          type: integer
          description: Total number of items
        hasNext:
          type: boolean
          description: Whether there is a next page
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
      required:
        - page
        - pageSize
        - totalPages
        - totalItems
        - hasNext
        - hasPrevious
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
    AbsenceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        externalId:
          type: string
