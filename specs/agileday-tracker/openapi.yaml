  /v1/position:
    get:
      summary: List managerial positions
      description: |
        Returns a paginated list of all managerial positions.
        Supports sorting, ordering, and filtering via query parameters.
      operationId: getManagerialPositions
      tags:
        - Core Data:Managerial Positions
      parameters:
        - name: limit
          in: query
          description: Maximum number of results to return per page.
          schema:
            type: integer
            default: 100
            minimum: 1
        - name: offset
          in: query
          description: Number of results to skip before returning. Used for pagination.
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: sortBy
          in: query
          description: Field to sort results by.
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
              - name
            default: createdAt
        - name: orderBy
          in: query
          description: Sort direction.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: filter
          in: query
          description: |
            JSON filter string for server-side filtering of results.
            Supported fields: id, name, unique, targetType, searchText, createdAt, updatedAt.

            Example to find by name: `{"name":{"contains":"Lead"}}`
            Example to search: `{"searchText":"Manager"}`
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of managerial positions.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    description: Array of managerial position objects.
                    items:
                      $ref: '#/components/schemas/ManagerialPositionResponse'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'
              example:
                data:
                  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    name: Team Lead
                    targetType:
                      - team
                    unique: true
                    createdAt: '2025-01-15T10:30:00Z'
                    updatedAt: '2025-01-15T10:30:00Z'
                  - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
