openapi: 3.0.0
info:
  title: Agileday API
  version: 1.0.0
  description: |
    ### **The AI Operating platform for Professional Services**
    [Agileday](https://www.agileday.com) is a professional services automation (PSA) platform that connects talent, allocations, timesheets, and project financials for services firms with 50–10,000 employees. We help professional service firms maximize utilization, improve employee experience, and scale their business through data-driven transparency.

    ---

    ### **API Overview**
    The **Agileday Public API** enables you to build custom integrations, automate workflows, and synchronize data between your existing tech stack and the Agileday platform.

    * **OpenAPI Specification:** Download or view the raw [openapi.yaml](./openapi.yaml) file.
    * **Technical Manual:** For detailed guidance on our data model and authentication, please visit our [Integration Guides](https://help.agileday.io/en/collections/9392755-integrations-apis).
    * **Company Website:** Learn more about our mission at [agileday.com](https://www.agileday.com).
    * **Support:** Need help? Contact our customer support team via the help center or [email us](mailto:help@agileday.com).

    ---

    ### **Key terminology**
    * **projectlike / projectlikeId:** Some API endpoints and fields use the term "projectlike" instead of "project". A projectlike is either a Project or an Opportunity. These share the same underlying structure, so endpoints that work with both use `projectlikeId` to accept either a project ID or an opportunity ID.
    * **reservation / reservationId:** Some API endpoints (notably V2 allocations) use `reservationId` instead of `openingId`. These refer to the same thing: an Opening. The Agileday UI always uses "Opening", but some API fields use "reservation" due to the underlying data model. When you see `reservationId`, pass an opening ID.
    * **externalId:** Many entities (employees, projects, customers, skills, openings, etc.) support an `externalId` field. Use this to store the ID from your external system (CRM, ERP, HRIS) so you can look up Agileday records by your own identifiers. External IDs are strings, must be unique per entity type, and can be used for lookups via `/external_id/{external_id}` endpoints where available.

    ---

    ### **Versioning & Deprecation Policy**
    The Agileday API uses **per-endpoint versioning** in the URL path (e.g., `/v1/opening`, `/v2/opening`). Each endpoint is versioned independently — a new version of one endpoint does not affect others.

    **Versioning rules:**
    - **Non-breaking changes** (new optional fields, new optional query parameters, new enum values) are added to the current version without creating a new one.

    **Deprecation process:**
    - Deprecated endpoints are marked with `deprecated: true` in this specification and include migration guidance in their description.
    - We provide a **minimum of 4 weeks' notice** before removing any deprecated endpoint.
    - During the deprecation period, both old and new versions remain fully functional.
    - After the deprecation period, the old version may be removed at any time.

    ---
servers:
  - url: '{basePath}'
    description: Agileday URL for the API
    variables:
      basePath:
        default: https://demo.agileday.io/api
        description: Tenant-specific URL to the API
tags:
  - name: Core Data
    x-summary: Master data and organizational settings
    x-displayName: Core Data
  - name: Core Data:Skills
    x-summary: Manage skills and competencies
    description: |
      Define and manage the skills, competencies, and technical capabilities used across your organization. Skills are a core part of talent matching. They connect what employees can do with what projects need.

      **When to use:**
      - Building your organization's skill taxonomy
      - Tracking employee competencies for talent matching
      - Defining skill requirements on openings to find the right people for projects
      - Maintaining multilingual skill translations for global teams

      **Key concepts:**
      - Skills can be organized into categories (e.g., "Programming", "Project Management")
      - Each skill supports translations in multiple languages
      - Skills help connect people with projects: assign skills to employees to describe their capabilities, and assign skills to openings to describe what a project needs. Agileday uses this for AI-powered talent matching.
      - Skills can include optional descriptions for clarity

      **Common workflow:**
      1. `POST /v1/skill` - Create new skill with translations
      2. `GET /v1/skill` - List all available skills
      3. `PATCH /v1/skill/id/{id}` - Update skill details
      4. Employee capabilities: assign skills to employees via `POST /v1/employee` or `PATCH /v1/employee/id/{id}` using `relationships` with `relationship: "skill"` and skill IDs
      5. Project needs: assign required skills to openings via `POST /v1/opening` or `PATCH /v1/opening/id/{id}` using `relationships` with `relationship: "skill"` and skill IDs
    x-displayName: Core Data:Skills
  - name: Core Data:Certificates
    x-summary: Manage certificates and certifications
    description: |
      Define and manage professional certificates, certifications, and qualifications used across your organization.

      **When to use:**
      - Building your organization's certification catalog
      - Tracking employee professional certifications and licenses
      - Matching certified employees to project requirements
      - Maintaining compliance and qualification records

      **Key concepts:**
      - Certificates represent formal qualifications, licenses, or certifications
      - Include professional certifications (PMP, AWS, Scrum Master, etc.)
      - Can have expiration dates for renewal tracking
      - Certificates are assigned to employee profiles. Unlike skills, they are not assigned to openings as requirements. Use skills for matching people to projects.

      **Common workflow:**
      1. `POST /v1/certificate` - Create new certificate type
      2. `GET /v1/certificate` - List all available certificates
      3. `PATCH /v1/certificate/id/{id}` - Update certificate details
      4. Assign certificates to employees via `POST /v1/employee` or `PATCH /v1/employee/id/{id}` using `relationships` with `relationship: "certificate"` and certificate IDs
    x-displayName: Core Data:Certificates
  - name: Core Data:Companies
    x-summary: Manage company information
    description: |
      Manage your organization's legal entities and company structure with support for parent-child hierarchies.

      **When to use:**
      - Setting up multi-company organizational structures
      - Managing subsidiaries and parent companies
      - Tracking legal entities for financial reporting
      - Organizing employees by legal employer

      **Key concepts:**
      - Companies represent legal entities within your organization
      - Support for parent-child relationships (holding companies and subsidiaries)
      - Employees are associated with a specific company
      - Used for legal, financial, and HR reporting by entity
      - Hierarchical structure enables consolidated and entity-level reporting

      **Common workflow:**
      1. `POST /v2/company` - Create new company entity
      2. `GET /v2/company` - List all companies in structure
      3. Assign employees to a company via `POST /v1/employee` or `PATCH /v1/employee/id/{id}` using `relationships` with `relationship: "company"` and the company ID
      4. You can also use `PATCH /v2/company/id/{id}` to assign employees to a company
    x-displayName: Core Data:Companies
  - name: Core Data:Business Units
    x-summary: Manage organizational business units
    description: |
      Create and manage business units that represent functional divisions or practice areas within your organization.

      **When to use:**
      - Organizing your workforce by practice area or service line
      - Setting up functional divisions (e.g., Cloud Services, Data Analytics, Strategy)
      - Managing multiple business lines or offerings
      - Tracking performance and utilization by business unit

      **Key concepts:**
      - Business units are flat organizational entities (no parent-child hierarchy)
      - Represent practice areas, service lines, or functional divisions
      - Employees and projects can be associated with business units
      - Used for P&L reporting, utilization tracking, and workforce management
      - Different from Teams (organizational structure) and Companies (legal entities)

      **Common workflow:**
      1. `POST /v1/business_unit` - Create new business unit
      2. `GET /v1/business_unit` - List all business units
      3. Assign employees to a business unit via `POST /v1/employee` or `PATCH /v1/employee/id/{id}` using `relationships` with `relationship: "businessUnit"` and the business unit ID
      4. Associate projects with a business unit via `PATCH /v1/project/id/{id}` using `relationships` with `relationship: "businessUnit"` and the business unit ID
    x-displayName: Core Data:Business Units
  - name: Core Data:Teams
    x-summary: Manage teams and team structures
    description: |
      Create and manage organizational teams that structure your workforce.

      **When to use:**
      - Setting up your organizational structure
      - Grouping employees by department, practice area, or function
      - Managing team hierarchies and reporting structures
      - Tracking team-based metrics and utilization

      **Key concepts:**
      - Teams represent organizational units (departments, practices, offices)
      - Employees can belong to teams for organizational grouping
      - Teams are used for reporting, permissions, and capacity planning

      **Common workflow:**
      1. `POST /v1/team` - Create new team
      2. `GET /v1/team` - List all teams
      3. `PATCH /v1/team/id/{id}` - Update team information
      4. Assign employees to a team via `POST /v1/employee` or `PATCH /v1/employee/id/{id}` using `relationships` with `relationship: "primaryTeam"` (single team) or `relationship: "team"` (additional teams)
    x-displayName: Core Data:Teams
  - name: Core Data:Roles
    x-summary: Manage commercial roles
    description: |
      Define the commercial roles used for billing, pricing, and talent matching in your projects.

      **When to use:**
      - Setting up billing roles for client engagements (e.g., Senior Consultant, Project Manager)
      - Defining pricing tiers for different role levels
      - Matching people to project requirements based on roles
      - Managing role-based rate cards

      **Key concepts:**
      - Roles are used for pricing and billing purposes
      - Each role has associated hourly rates in price lists
      - Roles are linked to project openings for talent matching
      - Separate from organizational job titles or hierarchy positions

      **Common workflow:**
      1. `GET /v1/role` - List all roles
      2. `GET /v1/role/id/{id}` - Get a specific role
      3. Add role-based rates to a price list via `POST /v1/pricelist/id/{id}/price` with the `roleId` field
      4. Assign a role to an opening via `POST /v1/opening` or `PATCH /v1/opening/id/{id}` using `relationships` with `relationship: "role"` and the role ID
    x-displayName: Core Data:Roles
  - name: Core Data:Managerial Positions
    x-summary: Manage named leadership roles and their organizational assignments
    description: |
      Define named leadership roles (e.g. "Team Lead", "Head of", "Account Manager") and control which organizational entities they can be assigned to.

      **When to use:**
      - Setting up your organization's leadership and accountability structure
      - Defining role types that can be assigned to employees in relation to teams, business units, projects, or other entities
      - Enforcing that only one person can hold a specific role per entity (e.g. one Team Lead per team)
      - Building org charts or responsibility matrices from structured data

      **Key concepts:**
      - A managerial position is a named role *type*, not an assignment. It defines what roles exist
      - Each position specifies `targetType`: which entity types it applies to (team, businessUnit, company, project, opportunity, employee)
      - The `unique` flag enforces at most one holder per target entity
      - Actual assignment of employees to positions is handled separately

      **Common workflow:**
      1. `POST /v1/position` - Create a position (e.g. "Team Lead" targeting `team`, unique)
      2. `GET /v1/position` - List all defined positions
      3. `PATCH /v1/position/{id}` - Update name, target types, or uniqueness constraint
      4. `DELETE /v1/position/{id}` - Remove a position (also removes all its assignments)
    x-displayName: Core Data:Managerial Positions
  - name: Users
    x-summary: User and employee profile management
    x-displayName: Users
  - name: Users:Profile
    x-summary: Manage user and employee profiles
    description: |
      Use these endpoints to create, read, update, and manage employee profile information in Agileday.

      **When to use:**
      - Creating new employees in your organization
      - Updating employee information (name, email, contact details)
      - Retrieving employee data for integrations
      - Managing employee status (active/inactive)

      **Key concepts:**
      - Each employee has a unique `id` (UUID) and optional `externalId` for integration
      - Use `externalId` to maintain references between Agileday and your external systems
      - Profile data includes basic information like name, email, and organizational associations
      - For CV/resume data, use the other Users sub-endpoints (Training, Education, Work Experience)

      **Common workflow:**
      1. `POST /v1/employee` - Create new employee
      2. `GET /v1/employee/id/{id}` - Retrieve employee details
      3. `PATCH /v1/employee/id/{id}` - Update employee information
      4. `GET /v1/employee` - List all employees with optional filtering
    x-displayName: Users:Profile
  - name: Users:Avatar
    x-summary: Manage user avatar images
    description: |
      Upload and manage employee profile pictures and avatar images.

      **When to use:**
      - Uploading employee profile photos during onboarding
      - Updating employee profile pictures
      - Syncing profile images from identity providers
      - Providing visual identification in the platform

      **Key concepts:**
      - Avatar images personalize employee profiles
      - Supports common image formats (JPEG, PNG, etc.)
      - Used throughout the application for employee identification
      - Can be synced from identity management systems
      - Enhances user experience and team collaboration

      **Common workflow:**
      1. `POST /v1/avatar/{employeeId}` - Upload profile picture (multipart/form-data with `image` field)
      2. `POST /v1/avatar/{employeeId}` - Replace with a new image by uploading again
      3. `DELETE /v1/avatar/{employeeId}` - Remove avatar if needed
    x-displayName: Users:Avatar
  - name: Users:Experiences
    x-summary: Get experiences
    description: |
      Retrieve individual experience records or access consolidated experience data through employee profiles (read-only).

      **When to use:**
      - Exporting employee profile data to external systems
      - Syncing experience data with HRIS or talent management platforms
      - Retrieving specific experience records for integrations
      - Building custom reporting on employee qualifications

      **Key concepts:**
      - Read-only endpoint - provides consolidated view only
      - Experience data aggregates Training, Education, Work Experience, and History Project
      - No POST/PATCH here - use specific endpoints (Training, Education, etc.) to add/update
      - Employee profile (`GET /v1/employee/id/{id}`) includes all experience data
      - Individual experiences retrievable by experience ID

      **Common workflow:**
      1. Add data via specific endpoints (Training, Education, Work Experience, History Project)
      2. `GET /v1/employee/id/{id}` - Get employee profile including all experiences
      3. `GET /v1/experience/id/{experienceId}` - Get specific experience record
    x-displayName: Users:Experiences
  - name: Users:Training
    x-summary: Manage training data in user profiles / CV
    description: |
      Record and manage employee training courses, workshops, and professional development activities.

      **When to use:**
      - Tracking employee professional development
      - Recording completed training courses and workshops
      - Building employee CVs with training history
      - Syncing training records from external learning management systems

      **Key concepts:**
      - Training entries include course names, providers, dates, and descriptions
      - Used for CV generation and skills development tracking
      - Can include internal and external training programs

      **Common workflow:**
      1. `POST /v1/training` - Add training record (specify employeeId, course name, provider, completion date, description)
      2. `PATCH /v1/training/id/{trainingId}` - Update training details
    x-displayName: Users:Training
  - name: Users:Education
    x-summary: Manage education history in user profiles / CV
    description: |
      Record and manage employee educational background including degrees, institutions, and areas of study.

      **When to use:**
      - Recording employee academic qualifications
      - Building comprehensive employee CVs
      - Syncing education data from HRIS or talent management platforms

      **Key concepts:**
      - Education entries include degree, institution, field of study, and graduation dates
      - Supports multiple degrees and continuing education
      - Used for CV generation and qualification verification

      **Common workflow:**
      1. `POST /v1/education` - Add education record (specify employeeId, degree, institution, major, graduation year)
      2. `PATCH /v1/education/id/{educationId}` - Update details
    x-displayName: Users:Education
  - name: Users:Work Experience
    x-summary: Manage work experience history in user profiles / CV
    description: |
      Record and manage employee work history from previous employers and positions.

      **When to use:**
      - Documenting employee career history before joining your organization
      - Building comprehensive CVs with prior experience
      - Syncing work history from HRIS or talent management platforms

      **Key concepts:**
      - Work experience includes previous employers, roles, and achievements
      - Captures career history outside your organization
      - Used for CV generation
      - Includes job titles, companies, dates, and key responsibilities
      - Separate from internal project history (see History Project)

      **Common workflow:**
      1. `POST /v1/work_experience` - Add previous employment (specify employeeId, company, job title, dates, responsibilities)
      2. `PATCH /v1/work_experience/id/{workExperienceId}` - Update details
    x-displayName: Users:Work Experience
  - name: Users:History Project
    x-summary: Manage project history in user profiles / CV
    description: |
      Manage employee project history and achievements, before they joined your organization. This is used for CV and experience tracking.

      **When to use:**
      - Documenting employee project work before joining your organization or when Agileday does not have the project in the system
      - Building CVs showcasing project work experience
      - Highlighting key achievements and deliverables
      - Creating client-facing team profiles with relevant project examples

      **Key concepts:**
      - Project history captures work done before joining your organization
      - Includes project names, roles, technologies, achievements, and challenges
      - Different from Work Experience (previous employers)
      - Used for CV generation

      **Common workflow:**
      1. `POST /v1/history_project` - Add history project to CV (specify employeeId, project name, role, technologies, key achievements)
      2. `PATCH /v1/history_project/id/{historyProjectId}` - Update details
    x-displayName: Users:History Project
  - name: Customers
    x-summary: Customer data
    x-displayName: Customers
  - name: Customers:Customer
    x-summary: Create and edit Customer data
    description: |
      Manage your client and customer organization information for opportunities and projects.

      **When to use:**
      - Syncing customer data from CRM systems
      - Creating new customer records for opportunities and projects
      - Updating customer contact information and details
      - Managing customer-specific settings and preferences

      **Key concepts:**
      - Customers are organizations you do business with
      - Each customer can have multiple opportunities and projects
      - Use `externalId` to link customers to your CRM or ERP systems
      - Customer data is referenced when creating opportunities and projects

      **Common workflow:**
      1. `POST /v1/customer` - Create new customer
      2. `GET /v1/customer` - List all customers
      3. `PATCH /v1/customer/id/{id}` - Update customer information
      4. Reference the customer ID when creating opportunities or projects
    x-displayName: Customers:Customer
  - name: Opportunities
    x-summary: Opportunity and sales pipeline management
    x-displayName: Opportunities
  - name: Opportunities:Opportunities
    x-summary: Create and manage opportunities
    description: |
      Manage your sales pipeline and pre-sales opportunities before they convert to active projects. Opportunities are typically created and managed in a CRM system (Salesforce, HubSpot, etc.) or directly in the Agileday UI. The API enables you to sync opportunities between systems and automate the sales-to-delivery pipeline.

      **When to use:**
      - Syncing opportunities from CRM systems (Salesforce, HubSpot, etc.)
      - Planning staffing needs for potential client engagements
      - Tracking sales pipeline and opportunity stages

      **Key concepts:**
      - Opportunities represent potential sales in your pipeline
      - Typically originate from CRM systems via integration
      - Opportunities contain openings (staffing requirements) for planning
      - When won, opportunities convert to projects for execution
      - Can be in various stages: prospecting, proposal, negotiation, won, lost

      **Common workflow:**
      1. `POST /v1/opportunity` - Create new opportunity (often via CRM sync)
      2. `POST /v1/opening` - Create openings on the opportunity to define staffing needs
      3. `PATCH /v1/opportunity/id/{id}` - Update opportunity details as it progresses through sales stages
      4. (Automatic) When an opportunity is won, a project is auto-created in Agileday
    x-displayName: Opportunities:Opportunities
  - name: Opportunities:Settings
    x-summary: Configure opportunity-specific settings
    description: |
      Manage billing and invoicing configuration for opportunities, primarily used when converting to projects.

      **When to use:**
      - Configuring billing settings for future project conversion
      - Setting up invoicing parameters before opportunity is won
      - Defining billing contact or payment terms
      - Preparing financial settings for project execution

      **Key concepts:**
      - Settings primarily relate to future billing and invoicing
      - Configure how the opportunity will be billed if won
      - Settings carry over to project when opportunity converts
      - Used to establish billing framework during sales phase
      - Helps ensure smooth transition from opportunity to project billing

      **Common workflow:**
      1. `GET /v1/opportunity/id/{id}/settings` - Retrieve current settings 
      2. `PATCH /v1/opportunity/id/{id}/settings` - Update during sales process
      3. (Automatic) Settings transfer to the project when the opportunity is won
    x-displayName: Opportunities:Settings
  - name: Opportunities:Finance
    x-summary: Opportunity financial management
    description: |
      View financial forecasts and estimates for sales opportunities (read-only).

      **When to use:**
      - Retrieving estimated revenue and value for opportunities
      - Generating pipeline financial reports
      - Viewing deal size and expected billing
      - Assessing staffing costs during pre-sales phase

      **Key concepts:**
      - Read-only endpoint - provides financial forecast view only
      - Financial data includes estimated revenue, costs, and margins
      - Data originates from CRM systems or opportunity creation
      - Used for pipeline reporting and sales forecasting
      - Helps inform staffing and capacity decisions
      - Financial estimates carry over to project budgets when opportunity is won

      **Common workflow:**
      1. `GET /v1/opportunity/id/{id}/finance` - Retrieve financial forecast for an opportunity
      2. Use data for pipeline reports and sales analytics
      3. (Automatic) Financial data converts to project financial data when the opportunity is won
    x-displayName: Opportunities:Finance
  - name: Projects
    x-summary: Project and task management
    x-displayName: Projects
  - name: Projects:Projects
    x-summary: Create and manage projects
    description: |
      Access and manage active client engagements and delivery projects. Projects are typically auto-created in Agileday when an opportunity is won, or created manually in the UI for internal work. The API is primarily used for syncing project data with external systems (ERP, PSA, project management tools).

      **When to use:**
      - Syncing projects with external project management systems
      - Enriching auto-created projects with data from external systems
      - Creating projects mastered in external systems (ERP, PSA, etc.)
      - Exporting automatically created projects to external systems
      - Retrieving project data for integrations and reporting

      **Key concepts:**
      - Projects are typically auto-created when opportunities are won
      - API primarily used for integration and data synchronization
      - Projects contain openings (staffing needs) and tasks
      - Can be client projects (billable) or internal projects (non-billable)
      - Use `externalId` to link projects with external systems
      - Projects track time entries, allocations, and financial performance

      **Common workflow:**
      1. (Automatic) Opportunity is won and project is auto-created in Agileday
      2. `GET /v1/project/id/{id}` - Retrieve project for external system sync
      3. `PATCH /v1/project/id/{id}` - Enrich with data from external systems
      4. Alternative: `POST /v1/project` - Create if project mastered externally
      5. Ongoing: Sync project updates bidirectionally with external systems
    x-displayName: Projects:Projects
  - name: Projects:Tasks
    x-summary: Manage project tasks
    description: |
      Sync and manage project tasks with external systems. Tasks are created either in the Agileday UI as part of project planning, or imported from external tools (Jira, Monday, etc.). Employees log time against tasks in the Agileday UI. The API enables you to sync tasks bidirectionally between systems.

      **When to use:**
      - Importing tasks from external project management tools (Jira, Monday, etc.)
      - Exporting Agileday tasks to external systems for consolidated tracking
      - Syncing task updates bidirectionally between systems
      - Creating tasks when project work breakdown is managed externally

      **Key concepts:**
      - Tasks represent specific work items or deliverables within projects
      - API primarily used for integration with external task/project management systems
      - Tasks can have custom pricing (overrides opening/project pricing)
      - Employees track time against tasks for detailed project costing
      - Use `externalId` to maintain task references across systems

      **Common workflow:**
      1. `POST /v1/project/id/{id}/task` - Create or import tasks into Agileday (e.g. syncing from Jira, Monday, etc.)
      2. `GET /v1/project/id/{id}/task` - Retrieve tasks for export to external systems
      3. `PATCH /v1/project/id/{id}/task/external_id/{task_external_id}` - Update task details (e.g. sync changes between systems) using external task ID
    x-displayName: Projects:Tasks
  - name: Projects:Openings
    x-summary: Manage openings and staffing needs
    description: |
      Define and manage staffing requirements (openings) for opportunities and projects. An opening represents a single staffing need, for example "we need a Senior Consultant on Project Alpha for Q2". Openings are typically created and managed in the Agileday UI by staffing managers, where AI-powered talent matching helps find the right people. The API enables you to create openings, define allocations, and sync staffing data with external planning systems.

      **When to use:**
      - Defining staffing needs for upcoming or active projects
      - Planning staffing needs during the opportunity (pre-sales) stage
      - Specifying role, skill, seniority, and region requirements for talent matching
      - Tracking the staffing lifecycle from open need → candidate → confirmed assignment

      **Key concepts:**
      - An opening is a staffing need attached to a project or opportunity. It defines what kind of person is needed (role, skills, seniority, region) but not when or how much. That is defined by Allocations (see below).
      - Dates and capacity are derived, not set directly. An opening's `startDate`, `endDate`, and capacity are automatically calculated from its allocation entries. You cannot set these on the opening itself.
      - `allocationMode` controls how capacity is expressed for the opening's allocations:
        - `allocation` (default): percentage-based (e.g., 100% = full-time, 50% = half-time)
        - `hours`: absolute hours for the period (e.g., 40 hours)
        - `workdays`: workday-based allocation
      - Staffing lifecycle: An opening tracks candidates (`speculatees`) and confirmed assignments (`contractees`). Speculatees are employees being considered; contractees are confirmed. Use the `relationships` field on create/update to manage these.
      - `projectlikeId` refers to either a project ID or an opportunity ID. Openings can belong to either.

      **Common workflow:**
      1. `POST /v1/opening` - Create an opening on a project or opportunity. Set the role via `relationships` with `relationship: "role"`. Set `allocationMode` to `allocation` or `hours`.
      2. `PUT /v2/allocation` or `POST /v1/allocation` - Define when and how much capacity is needed (see Allocations section for details on V1 vs V2).
      3. (Automatic) The opening's `startDate`, `endDate`, and capacity are recalculated from its allocations.
      4. `GET /v1/opening` - List openings for staffing overview. Use `GET /v1/opening/id/{id}` for a specific opening, including its nested `allocations` array.
      5. `PATCH /v1/opening/id/{id}` - Update opening details or assign employees. Use `relationships` with `relationship: "speculatee"` to add candidates, or `relationship: "contractee"` to confirm an assignment.
      6. `DELETE /v1/opening/id/{id}` - Remove an opening (also deletes its allocations).
    x-displayName: Projects:Openings
  - name: Projects:OpeningsV2
    x-summary: Manage openings (V2 — with pagination, filtering, and sorting)
    description: |
      V2 of the Openings API adds pagination, filtering, and sorting support. This is the recommended API for managing openings.

      **Key improvements over V1:**
      - Pagination via `limit`/`offset` parameters
      - Advanced filtering via the `filter` query parameter
      - Sorting via `sortBy`/`orderBy` parameters
      - Simplified request model: V2 uses direct ID fields (e.g., `roleId`, `seniorityId`, `contracteeIds`, `skills`) instead of the V1 `relationships` array syntax

      **Migration from V1 to V2:**

      | V1 endpoint | V2 equivalent |
      |---|---|
      | `GET /v1/opening` | `GET /v2/opening` (with pagination via `limit`/`offset`) |
      | `POST /v1/opening` | `POST /v2/opening` |
      | `GET /v1/opening/external_id/{external_id}` | `GET /v2/opening` with filter `{"externalId":{"equals":"..."}}` |
      | `GET /v1/opening/id/{id}` | `GET /v2/opening/id/{id}` |
      | `PATCH /v1/opening/id/{id}` | `PATCH /v2/opening/id/{id}` |
      | `DELETE /v1/opening/id/{id}` | `DELETE /v2/opening/id/{id}` |
      | `PATCH /v1/opening/id/{id}` with `relationships` (`"speculatee"`) | `GET/POST /v2/opening/id/{id}/candidate`, `GET/PATCH/DELETE /v2/opening/id/{id}/candidate/{employeeId}` |
      | `PATCH /v1/opening/id/{id}` with `relationships` (`"contractee"`) | `GET/POST /v2/opening/id/{id}/contractee`, `DELETE /v2/opening/id/{id}/contractee/{employeeId}` |

      V1 Openings endpoints are deprecated and will be removed on or after 2026-05-15. See the Deprecation Policy section above for details.
