  /v1/currency_rates:
    get:
      summary: Get all currency rates
      description: |
        - Returns a list of all currency rates in the system.
        - Only users with the subcontractor role or higher can access.
        - Returns 403 if the user does not have permission.
      operationId: getAllCurrencyRates
      tags:
        - Finance:Currency Rates
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all currency rates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CurrencyRate'
              example:
                data:
                  - currency: USD
                    baseCurrency: EUR
                    date: '2024-06-01'
                    rate: 1.18
                    source: API
                  - currency: FJD
                    baseCurrency: EUR
                    date: '2024-06-01'
                    rate: 2.65
                    source: API
        '403':
          description: Forbidden
    post:
      summary: Upsert an array of currency rates
      description: |
        - Only users with the administrator role can upsert currency rates.
        - Previous rates with the same currency, baseCurrency, and date are replaced.
        - Each rate must have a unique combination of currency, baseCurrency, and date.
        - Currency and baseCurrency cannot be the same.
        - The date must be the first of the month or 1900-01-01.
        - If a new base currency is introduced, all rates must use the same base currency.
        - If a rate for 1900-01-01 is missing for a currency, it will be auto-added if not present in the database.
        - On validation errors, returns 400.
      operationId: upsertCurrencyRates
      tags:
        - Finance:Currency Rates
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CurrencyRateUpsertRequest'
            example:
              - currency: USD
                baseCurrency: EUR
                date: '2024-06-01'
                rate: 1.18
              - currency: FJD
                baseCurrency: EUR
                date: '2024-06-01'
                rate: 2.65
      responses:
        '200':
          description: Upserted currency rates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CurrencyRate'
              example:
                data:
                  - currency: USD
                    baseCurrency: EUR
                    date: '2024-06-01'
                    rate: 1.18
                    source: API
                  - currency: FJD
                    baseCurrency: EUR
                    date: '2024-06-01'
                    rate: 2.65
                    source: API
        '400':
          description: Bad Request - validation or business rule error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
  /v1/currency_rates/base:
    get:
      summary: Get the base currency
      description: |
        - Returns the an array of the base currencies, which are the currencies with rateSource BASE
        - There should be only one base currency at a time.
        - If no base currencies are found, returns an empty array.
      operationId: getBaseCurrency
      tags:
        - Finance:Currency Rates
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The base currencies (ISO 4217 currency codes)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  description: ISO 4217 base currency code
              example:
                - EUR
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/currency_rates/currency/{currency}:
    get:
      summary: Get all rates for a currency
      description: |
        - Returns all rates for the specified currency.
        - Only users with the subcontractor role or higher can access.
        - Returns 403 if the user does not have permission.
      operationId: getRatesForCurrency
      tags:
        - Finance:Currency Rates
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: path
          required: true
          description: ISO 4217 currency code
          schema:
            type: string
            example: USD
      responses:
        '200':
          description: List of rates for the currency
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CurrencyRate'
              example:
                data:
                  - currency: USD
                    baseCurrency: EUR
                    date: '2024-06-01'
                    rate: 1.18
                    source: API
                  - currency: FJD
                    baseCurrency: EUR
                    date: '2024-06-01'
                    rate: 2.65
                    source: API
        '403':
          description: Forbidden
    delete:
      summary: Delete all rates for a currency
      description: |
        - Deletes all rates for the specified currency.
        - Only users with the administrator role can delete rates.
        - Returns 204 on success.
        - Returns 403 if the user does not have permission.
      operationId: deleteRatesForCurrency
      tags:
        - Finance:Currency Rates
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: path
          required: true
          description: ISO 4217 currency code
          schema:
            type: string
      responses:
        '204':
          description: All rates for the currency deleted
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/currency_rates/currency/{currency}/date/{date}:
    delete:
      summary: Delete a rate for a specified currency and date
      description: |
        - Deletes the rate for the specified currency and date.
        - Only users with the administrator role can delete rates.
        - The date must be the first of the month or 1900-01-01.
        - Returns 204 on success.
        - Returns 400 if the date is invalid.
        - Returns 403 if the user does not have permission.
      operationId: deleteRateForCurrencyDate
      tags:
        - Finance:Currency Rates
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: path
          required: true
          description: ISO 4217 currency code
          schema:
            type: string
            example: USD
        - name: date
          in: path
          required: true
          description: Date in YYYY-MM-DD format (must be 1st of month or 1900-01-01)
          schema:
            type: string
            format: date
            example: '2024-06-01'
      responses:
        '204':
          description: Rate deleted
        '400':
          description: Bad Request - invalid input (e.g. invalid date)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/currency_rates/currency/{currency}/rate_source:
    get:
      summary: Get the data source for a currency
      description: |
        - Returns the current rate source for the given currency.
        - If the currency does not exist, returns 404.
        - Only users with the subcontractor role or higher can access.
      operationId: getCurrencyRateSource
      tags:
        - Finance:Currency Rates
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: path
          required: true
          description: ISO 4217 currency code
          schema:
            type: string
      responses:
        '200':
          description: Data source for the currency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyRateSourceResult'
              example:
                currency: JPY
                rate_source: ECB
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Set the rate source for a currency
      description: |
        - Only users with the administrator role can set the rate source.
        - The rate_source must be one of: ECB, API, or BASE.
        - If rate_source is ECB, the currency must be supported by the ECB. Otherwise, returns 400.
        - If rate_source is BASE, only one currency can have BASE as its rate source at a time. If another currency is already set as BASE, setting a different currency to BASE will return 400. When a new currency is set to BASE, all other currencies previously set as BASE are updated to API.
        - If the currency does not exist, returns 400.
        - On database or internal errors, returns 500.
      operationId: setCurrencyRateSource
      tags:
        - Finance:Currency Rates
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: path
          required: true
          description: ISO 4217 currency code
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rate_source:
                  type: string
                  description: The new rate source
            example:
              rate_source: API
      responses:
        '200':
          description: Data source updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  currency:
                    type: string
                    description: ISO 4217 currency code
                  rate_source:
                    type: string
                    description: The new rate source
              example:
                currency: USD
                rate_source: API
        '400':
          description: Bad Request - invalid input (e.g. ECB not allowed for currency)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/customer:
    post:
      tags:
        - Customers:Customer
      summary: Create a new customer
      operationId: customers_Create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '200':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
    get:
      tags:
        - Customers:Customer
      summary: Read all customers
      description: |
        Retrieve a list of customers with optional filtering, sorting, and pagination.

        **Filtering by timestamps:**
        - Use `createdAfter`/`createdBefore` to filter by creation date
        - Use `updatedAfter`/`updatedBefore` to filter by last update date
        - All timestamps should be in ISO 8601 format (e.g., 2024-01-15T10:30:00Z)

        **Sorting:**
        - Use `sortBy` to specify the field to sort by (createdAt, updatedAt, or name)
        - Use `sortDirection` to specify ascending (asc) or descending (desc) order

        **Pagination:**
        - Use `limit` to specify maximum number of results (default: 100, max: 1000)
        - Use `offset` to skip a number of results for pagination
      operationId: customers_Read
      parameters:
        - $ref: '#/components/parameters/createdAfterOptionalParam'
        - $ref: '#/components/parameters/createdBeforeOptionalParam'
        - $ref: '#/components/parameters/updatedAfterOptionalParam'
        - $ref: '#/components/parameters/updatedBeforeOptionalParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortByOptionalParam'
        - $ref: '#/components/parameters/sortDirectionOptionalParam'
      responses:
        '200':
          description: Customers read
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
  /v1/customer/id/{id}:
    get:
      tags:
        - Customers:Customer
      summary: Read a customer by ID
      operationId: customers_GetById
      parameters:
        - name: id
          in: path
          required: true
