          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Revenue recognized in this specific month.

            For months with user-entered revenue recognition entries, this is the actual value.
            For unfilled months, this is the forecasted revenue based on cost progression.
          example: 15000
        cumulativeRevenue:
          type: number
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Cumulative sum of recognized revenue from the first month to this month.

            This accumulates both actual (user-entered) and forecasted revenue values
            from the project start through the end of this month.
          example: 45000
        isForecast:
          type: boolean
          description: |
            Whether this data represents forecasted values (true) or user-entered actual values (false).
          example: false
