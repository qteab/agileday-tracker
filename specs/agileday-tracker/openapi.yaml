    get:
      tags:
        - Finance:Revenue Recognition
      summary: Get revenue recognition forecast for a project
      description: |
        Returns the full revenue recognition forecast table data with summary.
        Includes target deal size, recognized/remaining revenue, monthly forecasted costs,
        readiness levels, cumulative calculated revenue, warranty period information,
        and scheduled fees for the project.

        **Formats:**
        - Omit `format` (or set to anything other than `xlsx`) for a JSON response.
        - Set `format=xlsx` to download an XLSX file with one row per metric and one column per month.
      operationId: GetRevenueRecognitionForecast
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/projectlikeIdParam'
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum:
              - xlsx
          description: Set to "xlsx" to download an XLSX file instead of JSON.
      responses:
        '200':
          description: Revenue recognition forecast data
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=revenue-recognition.xlsx
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/revenueRecognitionForecastResponse'
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
