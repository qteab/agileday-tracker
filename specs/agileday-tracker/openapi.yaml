      summary: Get monthly revenue recognition timeline by projectlike ID
      description: |
        Retrieve a complete monthly timeline of revenue recognition for a project.

        Returns monthly data from the first recognized revenue month to the last,
        filling any gaps with zero values. Each month includes:
        - Monthly recognized revenue amount
        - Cumulative revenue from project start
        - Whether the data is forecasted or user-entered

        **Use cases:**
        - Displaying revenue recognition charts and timelines
        - Analyzing revenue trends over time
        - Financial reporting and forecasting
      operationId: GetMonthlyRevenueRecognitionByProjectlikeId
      security:
