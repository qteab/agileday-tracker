  /v1/opportunity:
    get:
      tags:
        - Opportunities:Opportunities
      summary: Get all opportunities
      description: |
        Retrieve a list of opportunities with optional filtering, sorting, and pagination.

        **Filtering by timestamps:**
        - Use `createdAfter`/`createdBefore` to filter by creation date
        - Use `updatedAfter`/`updatedBefore` to filter by last update date
        - All timestamps should be in ISO 8601 format (e.g., 2024-01-15T10:30:00Z)

        **Additional Filters:**
        - Use `status` to filter by opportunity status
        - Use `salesChannel` to filter by sales channel

        **Sorting:**
        - Use `sortBy` to specify the field to sort by (createdAt, updatedAt, or name)
        - Use `sortDirection` to specify ascending (asc) or descending (desc) order

        **Pagination:**
        - Use `limit` to specify maximum number of results (default: 100, max: 1000)
        - Use `offset` to skip a number of results for pagination
      operationId: GetOpportunities
      parameters:
        - $ref: '#/components/parameters/createdAfterOptionalParam'
        - $ref: '#/components/parameters/createdBeforeOptionalParam'
        - $ref: '#/components/parameters/updatedAfterOptionalParam'
        - $ref: '#/components/parameters/updatedBeforeOptionalParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortByOptionalParam'
        - $ref: '#/components/parameters/sortDirectionOptionalParam'
        - in: query
          name: status
          schema:
            type: string
          description: Filter opportunities by status
        - in: query
          name: salesChannel
          schema:
            type: string
          description: Filter opportunities by sales channel
      responses:
        '200':
          description: Opportunities retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OpportunityResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
    post:
      tags:
        - Opportunities:Opportunities
      summary: Create a new opportunity
      operationId: CreateOpportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpportunityCreateRequest'
      responses:
        '200':
          description: Opportunity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
