      type: string
      description: The default state of the time card when the time card is empty
      enum:
        - contractedProjects
        - empty
    FreezeTime:
      type: string
      pattern: ^([0-1]?[0-9]|2[0-3]):00$
      description: The time of day to freeze the time card (full hours only, e.g., 00:00, 01:00, 23:00)
    FreezeTimezone:
      type: string
      description: The timezone of the time card (IANA timezone format)
    UnfreezeDurationHrs:
      type: integer
      minimum: 1
      maximum: 168
      description: The duration in hours when the time card is unfreezed
    TimeReportingPermissionEnum:
      type: string
      enum:
        - ANYONE
        - ONLY_CONTRACTED
        - ONLY_CONTRACTED_WITH_ALLOCATION
        - NO_ONE
      description: |
        Permission level for time reporting. These permissions control who can report time to projects.

        **ANYONE**: Any employee can report time to the project, regardless of contract status. Employee date restrictions (start/end dates) still apply.

        **ONLY_CONTRACTED**: Only employees who have an active contract (reservation) with the project can report time. Employee date restrictions still apply.

        **ONLY_CONTRACTED_WITH_ALLOCATION**: Only contracted employees can report time, and only within their allocation period (reservation start/end dates). Employee date restrictions also apply. The effective reporting window is the intersection of employee dates and allocation dates.

        **NO_ONE**: No one can report time to the project, regardless of contract status or other permissions.

        **Permission Resolution Order:**
        1. Project-level override (if set on the project) - highest priority
        2. Role-specific permission (if employee has matching accessRole)
        3. Global permission (accessRole = null) - lowest priority

        **Additional Restrictions (always enforced):**
        - Disabled employees cannot report time
        - Cannot report time before employee start date
        - Cannot report time after employee end date
        - For EXTERNAL/INTERNAL projects: Cannot report to projects in STAGING or FINISHED stage

        **Administrator Bypass:**
        Users with hr_admin role bypass all permission checks and can report time regardless of restrictions.
    TimeReportingPermissionEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the permission entry (only in responses, auto-generated)
        accessRole:
          type: string
          nullable: true
          description: |
            The access role this permission applies to. 

            - **NULL**: Global default permission that applies to all employees who don't have a role-specific permission. At least one entry with NULL accessRole must exist.
            - **Non-null**: Role-specific permission that applies only to employees with this access role. Role-specific permissions take precedence over global permissions.

            When checking permissions, the system first looks for a role-specific permission matching the employee's access role. If none exists, it falls back to the global permission (accessRole = null).
        externalProjectPermission:
          $ref: '#/components/schemas/TimeReportingPermissionEnum'
          nullable: true
          description: Permission level for external projects. Must be set for all permission entries.
        internalProjectPermission:
          $ref: '#/components/schemas/TimeReportingPermissionEnum'
          nullable: true
          description: Permission level for internal projects. Must be set for all permission entries.
        absencePermission:
          $ref: '#/components/schemas/TimeReportingPermissionEnum'
          nullable: true
          description: Permission level for absence projects. Must be set for all permission entries.
      required:
        - externalProjectPermission
        - internalProjectPermission
        - absencePermission
      example:
        accessRole: null
        externalProjectPermission: ANYONE
        internalProjectPermission: ANYONE
        absencePermission: ANYONE
    TimeReportingSettingsBase:
      type: object
      properties:
        organizationId:
          $ref: '#/components/schemas/OrganizationId'
        emptyTimeCardDefaultState:
          $ref: '#/components/schemas/EmptyTimeCardDefaultState'
        freezeDayOfMonth:
          type: integer
          description: The day to freeze the time card. Valid range depends on freezeInterval.
        freezeInterval:
          $ref: '#/components/schemas/FreezeInterval'
        freezeTime:
          $ref: '#/components/schemas/FreezeTime'
        freezeTimezone:
          $ref: '#/components/schemas/FreezeTimezone'
        unfreezeDurationHrs:
          $ref: '#/components/schemas/UnfreezeDurationHrs'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/TimeReportingPermissionEntry'
          description: |
            Array of permission entries defining who can report time to different project types.

            **Structure:**
            - Must contain at least one entry with `accessRole: null` (global default)
            - Can contain multiple entries with specific `accessRole` values for role-based permissions
            - All entries must have all three permission fields set (externalProjectPermission, internalProjectPermission, absencePermission)

            **Permission Resolution:**
            When checking if an employee can report time:
            1. If the project has a `timeReportingPermissionOverride` set, that takes highest priority
            2. Otherwise, look for a permission entry matching the employee's access role
            3. If no role-specific permission exists, use the global permission (accessRole = null)

            **Example Configuration:**
            ```json
            [
              {
                "accessRole": null,
                "externalProjectPermission": "ANYONE",
                "internalProjectPermission": "ANYONE",
                "absencePermission": "ANYONE"
              },
              {
                "accessRole": "subcontractor",
                "externalProjectPermission": "ONLY_CONTRACTED",
                "internalProjectPermission": "NO_ONE",
                "absencePermission": "ANYONE"
              }
            ]
            ```

            This configuration means:
            - Managers can report to any project type (role-specific permission)
            - All other employees can only report to external projects if they are contracted (global permission)
            - All employees can report to internal projects and absences (global permission)
      if:
        properties:
          freezeInterval:
            const: week
      then:
        properties:
          freezeDayOfMonth:
            $ref: '#/components/schemas/FreezeDayOfMonthWeekly'
      else:
        properties:
          freezeDayOfMonth:
            $ref: '#/components/schemas/FreezeDayOfMonthMonthly'
    TimeReportingSettingsResponse:
      allOf:
        - $ref: '#/components/schemas/TimeReportingSettingsBase'
        - type: object
          properties:
