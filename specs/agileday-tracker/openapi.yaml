    MonthlyFinancialsMonth:
      type: object
      description: |
        Monthly financial breakdown per calendar month. Totals combine actual (realized) amounts with projected backlog and sales, counting all allocations regardless of probability. revenue = realizedRevenue + backlogRevenue + salesRevenue (same pattern for cost and hours).
      required:
        - revenue
        - realizedRevenue
        - backlogRevenue
        - salesRevenue
        - cost
        - realizedCost
        - backlogCost
        - salesCost
        - margin
        - hours
        - realizedHours
        - allocatedHours
      properties:
        month:
          type: string
          format: date
          description: First day of the month
        currencyCode:
          type: string
          nullable: true
          description: ISO 4217 currency code
        revenue:
          type: number
          description: Total revenue (realized + backlog + sales)
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        realizedRevenue:
          type: number
          description: Revenue from actual reported hours.
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        backlogRevenue:
          type: number
          description: Projected revenue from confirmed project allocations (backlog).
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        salesRevenue:
          type: number
          description: Projected revenue from sales pipeline allocations.
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        cost:
          type: number
          description: Total cost (realized + backlog + sales).
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        realizedCost:
          type: number
          description: Cost from actual reported hours.
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        backlogCost:
          type: number
          description: Projected cost from confirmed project allocations (backlog).
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        salesCost:
          type: number
          description: Projected cost from sales pipeline allocations.
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        margin:
          type: number
          description: revenue - cost
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        marginPercentage:
          type: number
          nullable: true
          description: margin / revenue * 100; null when revenue is zero
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        hours:
          type: number
          description: Total hours (realized + backlog + sales)
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        realizedHours:
          type: number
          description: Actual reported hours.
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        allocatedHours:
          type: number
          description: |
            Total planned allocation hours for the month. Not included in the hours total (which equals realizedHours + backlog hours + sales hours); provided separately for capacity planning alongside realized hours.
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
        averageHourlyRate:
