  - name: Integration:OAuth Clients
    x-summary: Manage OAuth 2.1 clients applications for API and MCP access
    description: |
      Register and manage OAuth 2.1 client applications that authenticate against the Agileday API on behalf of users or automated systems. These endpoints also govern access to the **Model Context Protocol (MCP)** interface, which enables AI assistants and LLM-based tools to query and interact with Agileday data.

      ---

      ### OAuth 2.1 in Agileday

      Agileday implements **OAuth 2.1 with PKCE** (Authorization Code flow). Client applications obtain short-lived access tokens and optionally long-lived refresh tokens. All tokens are scoped to the authenticated user's role, further constrained by the client's `minimum_access_role` and `maximum_access_role` settings.

      Two registration modes are supported:

      | Mode | Description |
      |------|-------------|
      | **Static** | Registered by an administrator via these endpoints. Full control over allowed tools, redirect URIs, and token lifetimes. |
      | **Dynamic** (RFC 7591) | Self-registered by client applications at runtime. Governed by the tenant-level OAuth settings (`dynamic_clients_enabled`, `dynamic_client_minimum_role`, etc.). |

      ---

      ### MCP (Model Context Protocol) Access

      When `mcp_enabled` is set to `true` on a client, authenticated users can connect AI assistants (such as Claude Desktop, Cursor, or custom LLM agents) to Agileday through the MCP interface. The client's `allowed_tools` list restricts which MCP operations the AI can invoke — leave it null to allow all available tools.

      Use `GET /v1/oauth/mcptools` to discover all available MCP tools and their descriptions before configuring `allowed_tools`.

      ---

      ### Role Scoping

      Each client has two optional role boundaries that are applied on top of the authenticated user's actual role:

      - **`minimum_access_role`** — Users with a lower role than this cannot authenticate with the client at all.
      - **`maximum_access_role`** — Tokens issued for this client are capped at this role, even if the user's actual role is higher. Use this to issue least-privilege tokens for automated workflows.

      Roles in order of increasing privilege: `employee` → `hr_admin` → `administrator` → `agileday_admin`.

      ---

      ### Client Secrets

      Client secrets are **shown only once** — immediately after `POST /v1/oauth/clients` or `POST /v1/oauth/clients/{clientId}/regenerate-secret`. Store the secret securely (e.g., in a secrets manager) at that point; it cannot be retrieved again. The secret is stored as an AES-256-GCM-encrypted bcrypt hash, never in plaintext.

      To rotate a compromised secret, use the regenerate endpoint. The old secret is invalidated immediately.

      ---

      **When to use:**
      - Registering a custom integration that authenticates as a specific Agileday user
      - Connecting an AI assistant (Claude, Cursor, GPT, etc.) to Agileday via MCP
      - Building internal tooling that queries the Agileday API with user-delegated permissions
      - Configuring dynamic client registration policies for self-service integrations
      - Rotating client secrets as part of a security review cycle

      **Key concepts:**
      - Clients are tenant-scoped — each client belongs to one Agileday tenant
      - Static clients are managed here; dynamic clients are created by the OAuth `/register` endpoint
      - Soft-deleted clients immediately block new authentications but do not invalidate existing tokens
      - `allowed_tools` restricts MCP access at the client level, not the user level
      - Token lifetimes can be tuned per client for security vs. usability trade-offs

      **Common workflow:**
      1. `GET /v1/oauth/settings` — Check that `oauth_enabled` is `true` for the tenant
      2. `GET /v1/oauth/mcptools` — Discover available MCP tools to populate `allowed_tools`
      3. `POST /v1/oauth/clients` — Create client; save the returned `client_secret` immediately
      4. Configure the client application with the `client_id`, `client_secret`, and redirect URIs
      5. `PUT /v1/oauth/clients/{clientId}` — Adjust role scoping, tools, or token lifetimes as needed
      6. `POST /v1/oauth/clients/{clientId}/regenerate-secret` — Rotate secret on a schedule or after a security incident
      7. `DELETE /v1/oauth/clients/{clientId}` — Revoke access when the integration is decommissioned
    x-displayName: Integration:OAuth Clients
  - name: Integration:SCIM
    x-summary: SCIM protocol for user provisioning
    description: |
      Use SCIM 2.0 protocol for automated user provisioning and identity management integration.

      **When to use:**
      - Integrating with identity providers (Azure AD, Okta, OneLogin)
      - Automating user provisioning and deprovisioning
      - Syncing user information from SSO systems
      - Managing user lifecycle through identity management platforms

      **Key concepts:**
      - SCIM (System for Cross-domain Identity Management) is a standard protocol
      - Enables automated user creation, updates, and deletion
      - Commonly used with SSO and identity provider integrations
      - Supports user and group management
      - Industry-standard for identity synchronization

      **Common workflow:**
      1. Configure SCIM integration in your identity provider
      2. Identity provider pushes user changes to Agileday
      3. Users automatically created/updated when added to identity system
      4. Users deactivated when removed from identity system
    x-displayName: Integration:SCIM
  - name: Integration:Events
    x-summary: System events to be polled
    description: |
      Poll for system events to build event-driven integrations and stay synchronized with Agileday changes.

      **When to use:**
      - Building event-driven integrations
      - Detecting changes to employees, projects, time entries, etc.
      - Synchronizing data with external systems (ERP, CRM, HRIS)
      - Triggering workflows based on Agileday changes

      **Key concepts:**
      - Events represent changes in the Agileday system (creates, updates, deletes)
      - Poll the events endpoint regularly to detect changes since your last check
      - Each event includes the entity type, action, timestamp, and entity ID
      - Use events for incremental sync instead of full data refreshes
      - More efficient than polling individual entity endpoints
      - Use `GET /v1/events/query/meta` to retrieve the list of supported event types

      **Common workflow:**
      1. `GET /v1/events/query/meta` - Discover available event types and subscribe to the ones relevant to your integration
      2. `GET /v1/events/query` - Poll for new events since last check
      3. Process each event (employee created, project updated, etc.) and fetch the full entity via its endpoint if needed
      4. Track last processed event ID for next poll
      5. Poll regularly (e.g., every 5-15 minutes)
    x-displayName: Integration:Events
