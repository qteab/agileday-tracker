        This endpoint is useful when you need to look up revenue recognition entries using your own
        system's identifier rather than Agileday's internal UUID.

        The endpoint first resolves the external ID to the internal projectlike UUID, then returns
        all revenue recognition entries for that project, ordered by month (most recent first).

        **Use cases:**
        - Integration with external financial systems
        - Automated reporting using external project identifiers
        - Syncing revenue recognition data with ERP systems
      operationId: GetRevenueRecognitionsByProjectlikeExternalId
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/projectlikeExternalIdParam'
      responses:
        '200':
          description: List of revenue recognition entries for the project
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/revenueRecognitionResponse'
              example:
                data:
                  - id: 123e4567-e89b-12d3-a456-426614174000
                    projectlikeId: abc12345-e89b-12d3-a456-426614174000
                    month: '2024-03-01'
                    recognizedRevenue: 15000
                    comment: Revenue recognized based on 60% project completion
                    lastUpdatedBy: user123-e89b-12d3-a456-426614174000
                    valuationDate: '2024-03-15'
                    isLocked: true
                    createdAt: '2024-03-15T09:00:00Z'
                    updatedAt: '2024-03-15T09:00:00Z'
                    isUpdated: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
