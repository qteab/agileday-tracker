  /v1/events/query:
    get:
      tags:
        - Integration:Events
      summary: Get a list of events
      parameters:
        - in: query
          name: typenames
          schema:
            type: string
          description: A comma separated list of typenames to return (optional, defaults to all types available). See /v1/events/query/meta for a list of currently valid typenames.
        - in: query
          name: operations
          schema:
            type: string
          description: A comma separated list of operations to return (optional, defaults to all types available). See /v1/events/query/meta for a list of currently valid operations.
        - in: query
          name: start
          schema:
            type: string
            format: date-time
          example: '2024-01-01T00:00:00.000000000'
          description: The start of the time range to retrieve events for (optional, defaults to 100 years ago). Date-time format without timezone.
        - in: query
          name: end
          schema:
            type: string
            format: date-time
          example: '2024-12-31T23:59:59.999999999'
          description: The end of the time range to retrieve events for (optional, defaults to now). Date-time format without timezone.
        - in: query
          name: limit
          schema:
            type: integer
          description: The maximum number of events to return (optional, defaults to the maximum allowed). See /v1/events/query/meta for the current maximum number of events that can be returned.
      responses:
        '200':
          description: Events data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventV2Response'
        '400':
          description: Invalid token
        '403':
          description: Not enough privileges
      security:
        - bearerAuth: []
  /v1/events/query/meta:
    get:
      tags:
        - Integration:Events
      summary: Get metadata about currently available event types and operations
      responses:
        '200':
          description: Event query metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  validTypenames:
                    type: array
                    items:
                      type: string
                    example:
                      - Skill
                      - EmployeeSkill
                      - Like
                      - Hours
                  validOperations:
                    type: array
                    items:
                      type: string
                    example:
                      - INSERT
                      - UPDATE
                      - DELETE
                  maximumEvents:
                    type: integer
                    example: 1000
        '403':
          description: Not enough privileges
      security:
        - bearerAuth: []
