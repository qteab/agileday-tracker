  - name: Time Tracking:Flex Balance
    x-summary: Manage employee flex time balances
    description: |
      Track and manage employee flexible working time balances (overtime, time banking).

      **When to use:**
      - Viewing employee flex time balances
      - Tracking accumulated overtime or time debt
      - Managing adjustments to flextime balances (e.g. corrections, imported balances)
      - Integrating flex balance with payroll systems

      **Key concepts:**
      - Flex balance tracks the difference between expected and actual worked hours
      - Positive balance = overtime worked (employee can take time off)
      - Negative balance = time debt (employee needs to work more hours)
      - Automatically calculated from submitted time entries
      - `/v1/flexbalance` exposes manual adjustments only (e.g. corrections, imported balances)
      - `/v1/flexbalance/totals` exposes the complete flex balance status, combining all adjustments with the employee's time reporting data

      **Common workflow:**
      1. `POST /v1/flexbalance/totals` - Retrieve the complete flex balance status for employees (requires filter in request body)
      2. `GET /v1/flexbalance` - Retrieve manual adjustments
      3. `POST /v1/flexbalance` - Create a manual adjustment (e.g. import an opening balance or apply a correction)
      4. (Automatic) Time entries automatically update the totals
