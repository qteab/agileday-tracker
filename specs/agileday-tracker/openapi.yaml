  - name: Reporting:Time Reporting
    x-summary: Time tracking reports and summaries
    description: |
      Retrieve detailed time reporting data combining time entries with allocation, employee, project, and financial information. This is the recommended API for building time-based reports and data exports.

      **When to use:**
      - Building BI dashboards with time and allocation data
      - Exporting time data to external analytics or ERP systems
      - Generating utilization and deviation reports (actual vs. allocated)
      - Integrating time reporting data with financial systems

      **Key concepts:**
      - Each row represents a single time entry enriched with context: employee details, project info, opening data, organizational structure, and financial metrics (revenue, costs)
      - Supports optional snapshot mode (`useSnapshot=true`) for high-performance queries. Snapshots are refreshed nightly, so data may be up to one day behind.
      - Extensive filtering by company, customer, project, business unit, team, and employee (by ID, external ID, or email)
      - Supports pagination via `offset` and `limit` (max 1000)
      - Date range is required (`startDate` and `endDate`)

      **Common workflow:**
      1. `GET /v2/reporting/time_reporting` - Retrieve time reports for a date range with optional filters
      2. Use `useSnapshot=true` for large date ranges or recurring batch exports where near-real-time accuracy is acceptable
      3. Filter by organizational dimensions (company, team, business unit) for targeted reports
    x-displayName: Reporting:Time Reporting
  - name: Reporting:Allocation Reporting
    x-summary: Allocation reports and analytics
    description: |
      Retrieve daily allocation data enriched with financial metrics, employee context, and organizational structure. Data is precalculated by a nightly background job for fast retrieval.

      **When to use:**
      - Building allocation-based BI dashboards and capacity reports
      - Exporting allocation data with financial metrics to external systems
      - Analyzing utilization, revenue, and cost projections based on allocations
      - Comparing allocated vs. actual hours and deviation analysis

      **Key concepts:**
      - Data is precalculated nightly — results may be up to one day behind real-time
      - Historical allocations are refreshed for the last 6 months; future allocations up to 2 years ahead
      - Date range limit is 3 months per request (`startDate` inclusive, `endDate` exclusive)
      - Each row represents one day of allocation for one employee on one opening, enriched with financial data (revenue, costs, pricing)
      - Extensive filtering by employee, project, customer, team, business unit, and company (by ID or external ID)
      - Requires `sales_admin` role or above

      **Common workflow:**
      1. `GET /v1/reporting/allocation` - Retrieve allocation data for a date range (max 3 months) with optional filters
      2. Use organizational filters to scope reports by team, business unit, or company
      3. Combine with time reporting data for full actual vs. allocated analysis
    x-displayName: Reporting:Allocation Reporting
