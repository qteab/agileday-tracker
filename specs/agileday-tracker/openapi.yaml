  /v1/employee:
    get:
      summary: Return a list of employees
      description: |
        Retrieve a list of employees with optional filtering, sorting, and pagination.

        **Filtering by timestamps:**
        - Use `createdAfter`/`createdBefore` to filter by creation date
        - Use `updatedAfter`/`updatedBefore` to filter by last update date
        - All timestamps should be in ISO 8601 format (e.g., 2024-01-15T10:30:00Z)

        **Sorting:**
        - Use `sortBy` to specify the field to sort by (createdAt, updatedAt, firstName, lastName, or name)
        - Use `sortDirection` to specify ascending (asc) or descending (desc) order

        **Pagination:**
        - Use `limit` to specify maximum number of results (default: 100, max: 1000)
        - Use `offset` to skip a number of results for pagination
      tags:
        - Users:Profile
      parameters:
        - $ref: '#/components/parameters/createdAfterOptionalParam'
        - $ref: '#/components/parameters/createdBeforeOptionalParam'
        - $ref: '#/components/parameters/updatedAfterOptionalParam'
        - $ref: '#/components/parameters/updatedBeforeOptionalParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortByOptionalParam'
        - $ref: '#/components/parameters/sortDirectionOptionalParam'
      responses:
        '200':
          description: A list of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
    post:
      summary: Create a new employee
      operationId: CreateEmployee
      tags:
        - Users:Profile
      requestBody:
        description: Employee data to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreateRequest'
      responses:
        '200':
          description: The created employee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearerAuth: []
