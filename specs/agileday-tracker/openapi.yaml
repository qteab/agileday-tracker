  /v1/scheduled_fee:
    post:
      tags:
        - Finance:Scheduled Fees
      summary: Create scheduled fee
      description: |
        Create a new scheduled fee for a project or opportunity.

        Scheduled fees are planned billing milestones that can be associated with either
        fixed-price or time & materials billing models. They appear in the billing
        view and can be converted to invoice items when ready to bill.

        **Required fields:**
        - `projectlikeId`: The project or opportunity this fee belongs to
        - `commercialModel`: Either TIME_MATERIALS or FIXED_PRICE
        - `date`: When the fee is scheduled
        - `name`: Display name for the fee
        - `amount`: Fee amount in the project's currency
      operationId: CreateScheduledFee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Scheduled fee data to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/scheduledFeeCreateRequest'
            example:
              projectlikeId: 123e4567-e89b-12d3-a456-426614174000
              commercialModel: FIXED_PRICE
              date: '2024-03-15'
              name: Milestone 1 - Design Phase
              description: Completion of UX design and wireframes
              amount: 15000
              invoiceProductId: 987fcdeb-51a2-3c4d-e5f6-789012345678
              externalId: EXT-SF-001
      responses:
        '200':
          description: Scheduled fee created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scheduledFeeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
