  - name: Time Tracking:Timesheets
    x-summary: Timesheet management and approval
    description: |
      View and manage employee timesheets, including weekly project hours, submission status, and freeze/unfreeze workflows. Employees fill and submit their timesheets in the Agileday UI. The API enables payroll integrations, administrative corrections (freeze/unfreeze), and programmatic timesheet review.

      **When to use:**
      - Reviewing employee weekly timesheets and project hour breakdowns
      - Filling timesheets from allocations or contracted projects
      - Copying hours between weeks
      - Managing timesheet freeze and unfreeze for payroll corrections
      - Retrieving hours summaries and reportable projects for an employee

      **Key concepts:**
      - A timesheet (timecard) represents one employee's time reporting for a specific week
      - Timesheets have statuses: NEW, SAVED, SUBMITTED, CHANGE_REQUESTED, APPROVED (only SAVED and SUBMITTED are active)
      - Frozen timesheets are locked and cannot be edited until explicitly unfrozen
      - Freeze schedules are configurable per organization (weekly or monthly intervals)
      - Timesheets contain rows per project/task with daily hour entries
      - Fill operations can auto-populate hours from allocations or contracted projects

      **Common workflow:**
      1. `POST /v1/timesheets/by-employee/month/{month}` - Get timesheets by employee for a month
