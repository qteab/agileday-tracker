  - name: Projects:Allocations
    x-summary: Create and manage allocation entries for Openings
    description: |
      Define when and how much capacity is needed for an opening. Allocations are the entries that give an opening its dates and capacity. Without allocations, an opening has no time period. Two API versions are available. V2 is recommended for most integration use cases due to its simpler date-range model.

      **When to use:**
      - Defining capacity (percentage or hours) and time periods for staffing requirements
      - Updating allocations as project timelines or staffing needs change
      - Syncing allocation data from external staffing or planning systems

      **Key concepts:**

      Understanding the two API versions:

      - V1 (`/v1/allocation`) uses a change-point model. Each allocation entry has a `startDate` and a value. The value applies from that `startDate` until the next entry's `startDate`. To define a complete period, you need at least two entries: one to start and one with value `0` to end.

        Example, 100% allocation for January 2026:
        ```
        Entry 1: { startDate: "2026-01-01", allocation: 100 }
        Entry 2: { startDate: "2026-02-01", allocation: 0 }
        ```
        This means "100% from Jan 1 until Feb 1 (exclusive), then 0%." Without the second entry, the allocation has no defined end.

        To change capacity mid-period, add another entry:
        ```
        Entry 1: { startDate: "2026-01-01", allocation: 100 }
        Entry 2: { startDate: "2026-02-01", allocation: 50 }
        Entry 3: { startDate: "2026-04-01", allocation: 0 }
        ```
        This means "100% in January, 50% in February-March, then done."

      - V2 (`/v2/allocation`) uses a date-range model. You specify `startDate`, `endDate`, and the capacity value in a single request. No need to manage terminating zero-entries.

        Example, 100% allocation for January 2026:
        ```
        { reservationId: "<openingId>", startDate: "2026-01-01", endDate: "2026-02-01", allocationValue: 100, replaceExisting: true }
        ```
        The `endDate` is exclusive (the day after the last allocated day). V2 also supports `replaceExisting: false` to insert allocations between existing ones without overwriting.

      Allocation modes (set on the opening):
      - `allocation` mode → use the `allocation` field (V1) or `allocationValue` field (V2), values 0–100 representing percentage
      - `hours` mode → use the `hours` field (V1) or `hoursValue` field (V2), representing total hours for the period

      **Common workflow:**
      1. Create an opening on a project or opportunity (see Openings section).
      2. V2 (recommended): `PUT /v2/allocation` - specify `reservationId` (= opening ID), `startDate`, `endDate`, and `allocationValue` or `hoursValue`.
      3. V1 (granular control): `POST /v1/allocation` - create individual change-point entries. Remember to include a terminating entry with value `0`.
      4. (Automatic) The opening recalculates its `startDate`, `endDate`, and capacity from its allocations.
      5. `GET /v1/allocation/opening_id/{opening_id}` - retrieve all allocation entries for a specific opening.
      6. V2: `PUT /v2/allocation` with updated values to adjust. V1: `PATCH /v1/allocation` to update individual entries, or `DELETE /v1/allocation/id/{id}` to remove one.
    x-displayName: Projects:Allocations
