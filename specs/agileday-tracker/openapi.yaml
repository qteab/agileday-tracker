    Allocation:
      type: object
      description: |
        An allocation record defining the allocation value starting from a specific date.
        The allocation value applies from `startDate` until the next allocation's `startDate`.

        **Important**: Either `allocation` OR `hours` will be set, never both.
        Which field is used depends on the opening's `allocationMode`:
        - When `allocationMode` is "allocation": `allocation` field contains percentage (0-100)
        - When `allocationMode` is "hours": `hours` field contains the hours value
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this allocation record
          example: 88d4e9f4-0964-44cd-a7f9-b7611d4727e0
        allocation:
          type: number
          format: float
          description: |
            Allocation as a percentage (0-100). Only set when the opening's `allocationMode` is "allocation".

            - 100 = full-time allocation (100% of working hours)
            - 50 = half-time allocation
            - 0 = no allocation (marks the end of an allocation period)

            **Note**: When `allocationMode` is "hours", this field will be null and `hours` will be set instead.
          example: 100
        startDate:
          type: string
          format: date
          description: |
            The date from which this allocation value applies (inclusive).
            The allocation continues until the next allocation record's `startDate`.
            Format: YYYY-MM-DD
          example: '2025-04-09'
        hours:
          type: number
          format: float
          description: |
            Allocation as total hours for the period. Only set when the opening's `allocationMode` is "hours".

            This represents the total hours from this allocation's `startDate` until the next allocation's `startDate`.
            For example, if `hours` is 8 and the period is one working day, it means 8 hours for that day.

            **Note**: When `allocationMode` is "allocation", this field will be null and `allocation` will be set instead.
          example: 8
