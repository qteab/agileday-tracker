    revenueRecognitionBase:
      type: object
      properties:
        projectlikeId:
          type: string
          format: uuid
          description: |
            UUID of the project or opportunity this revenue recognition entry belongs to.

            This links the revenue recognition to a specific project for financial tracking
            and reporting purposes.
          example: abc12345-e89b-12d3-a456-426614174000
        month:
          type: string
          format: date
          description: |
            The month for which revenue is being recognized, in YYYY-MM-DD format.

            **Important:** Must be the first day of the month (day must be 01).
            For example, use "2024-03-01" for March 2024.

            **Unique constraint:** Only one revenue recognition entry can exist per
            project per month. Attempting to create a duplicate will result in a 409 Conflict error.
          example: '2024-03-01'
        recognizedRevenue:
          type: number
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            The amount of revenue recognized for this project in this month, in the project's currency.

            This represents the revenue that can be recognized according to accounting standards,
            typically based on percentage-of-completion or other revenue recognition methods.

            Can be positive (revenue recognized) or negative (revenue reversal).
          example: 15000
        comment:
          type: string
          description: |
            Explanation or notes about this revenue recognition entry.

            This field is required and should provide business justification for the recognized
            amount. It's used for audit trail and helps explain the basis for revenue recognition.

            **Examples:**
            - "Revenue recognized based on 60% project completion using cost-to-cost method"
            - "Rounded down for safety margin"
          example: Revenue recognized based on 60% project completion using cost-to-cost method
        valuationDate:
          type: string
          format: date
          description: |
            The date when this revenue recognition valuation was performed, in YYYY-MM-DD format.

            The forecasted values for this revenue recognition entry were calculated on this date.
          example: '2024-03-15'
        isLocked:
          type: boolean
          description: |
            When true, this record cannot be modified or deleted. Used to prevent changes to
            finalized financial data.

            **Important:** Locked entries must be unlocked (set to false) before they can be
            updated or deleted. Attempting to modify or delete a locked entry will result in
            a 400 Bad Request error.

            **Use cases:**
            - Locking entries after month-end close
            - Preventing changes to audited financial data
            - Protecting entries that have been reported externally
          default: false
          example: false
        cumulativeCosts:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Total costs accumulated for the project up to the end of the month (optional).

            Used in percentage-of-completion calculations. Represents all costs incurred
            from project start through the end of the month.
          example: 36000
        forecastedCosts:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Estimated total costs for the entire project (optional).

            Used in percentage-of-completion calculations. Represents the expected total
            cost when the project is complete (estimate at completion).
          example: 60000
        targetDealSize:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Target revenue for the entire project (optional).

            The total contracted or expected revenue for the project. Used as the basis
            for calculating recognized revenue percentages.
          example: 100000
        cumulativeCalculatedRevenueRecognition:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Calculated cumulative revenue recognition based on cost-to-cost method (optional).

            This is typically calculated as: (cumulativeCosts / forecastedCosts) * targetDealSize

            Represents the total revenue that should be recognized from project start through
            the end of the month based on percentage-of-completion.
          example: 60000
        previouslyRecognizedRevenue:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Sum of revenue recognized in all previous months (optional).

            Used to calculate the current month's recognition amount. The difference between
            cumulativeCalculatedRevenueRecognition and previouslyRecognizedRevenue gives
            the amount to recognize in the current month.
          example: 45000
        warrantyValue:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Snapshot of the warranty period amount at the time of save (optional).

            Captured from the project's warranty configuration for historical comparison.
          example: 10000
        targetDealSizeExcludingWarranty:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: |
            Snapshot of the target deal size minus the warranty amount at the time of save (optional).

            Calculated as targetDealSize - warrantyValue for historical comparison.
          example: 90000
    revenueRecognitionCreateRequest:
      allOf:
        - $ref: '#/components/schemas/revenueRecognitionBase'
      required:
        - projectlikeId
        - month
        - recognizedRevenue
        - comment
        - valuationDate
      description: |
        Request body for creating a new revenue recognition entry.

        **Required fields:** projectlikeId, month, recognizedRevenue, comment, valuationDate

        **Optional fields:** isLocked, cumulativeCosts, forecastedCosts, targetDealSize,
        cumulativeCalculatedRevenueRecognition, previouslyRecognizedRevenue,
        warrantyValue, targetDealSizeExcludingWarranty

        **Note:** The `lastUpdatedBy` field is automatically set to the current user and should
        not be included in the request.
    revenueRecognitionUpdateRequest:
      type: object
      description: |
        Partial update request for a revenue recognition entry. Include only the fields you want to change.

        All fields are optional - omitted fields will retain their current values.

        **Restrictions:**
        - Cannot update entries where `isLocked: true` (unlock first)
        - The `lastUpdatedBy` field is automatically updated to the current user
        - Changing `month` may cause conflict if duplicate entry exists
      properties:
        month:
          type: string
          format: date
          description: |
            The month for revenue recognition (must be first day of month).

            **Warning:** Changing this may cause a 409 Conflict if another entry exists
            for the new month.
          example: '2024-04-01'
        recognizedRevenue:
          type: number
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: The amount of revenue recognized for this month
          example: 17500
        comment:
          type: string
          description: Updated explanation or notes about this revenue recognition entry
          example: Updated after final cost review - adjusted from 60% to 70% completion
        valuationDate:
          type: string
          format: date
          description: The date when this revenue recognition valuation was performed
          example: '2024-03-20'
        isLocked:
          type: boolean
          description: |
            Lock or unlock the entry. Set to true to prevent further modifications,
            or false to allow updates.
          example: true
        cumulativeCosts:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: Updated total costs accumulated for the project
          example: 42000
        forecastedCosts:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: Updated estimated total costs for the entire project
          example: 65000
        targetDealSize:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: Updated target revenue for the entire project
          example: 105000
        cumulativeCalculatedRevenueRecognition:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: Updated calculated cumulative revenue recognition
          example: 68000
        previouslyRecognizedRevenue:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: Updated sum of revenue recognized in all previous months
          example: 50500
        warrantyValue:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: Updated warranty period amount snapshot
          example: 10000
        targetDealSizeExcludingWarranty:
          type: number
          nullable: true
          x-go-type: decimal.Decimal
          x-go-type-import:
            path: github.com/shopspring/decimal
          description: Updated target deal size excluding warranty snapshot
          example: 90000
    revenueRecognitionResponse:
      type: object
      description: |
        Complete revenue recognition entry representation including system-managed fields.

        This includes all user-provided data plus read-only fields managed by the system
        such as id, lastUpdatedBy, createdAt, updatedAt, and isUpdated.
      required:
        - id
        - projectlikeId
        - month
        - recognizedRevenue
        - comment
        - lastUpdatedBy
        - valuationDate
        - isLocked
        - createdAt
        - updatedAt
        - isUpdated
      allOf:
        - $ref: '#/components/schemas/revenueRecognitionBase'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              description: |
                Unique identifier for the revenue recognition entry (generated by system).

                This UUID is automatically generated when the entry is created and cannot be changed.
              readOnly: true
              example: 123e4567-e89b-12d3-a456-426614174000
            lastUpdatedBy:
              type: string
              format: uuid
              description: |
                UUID of the employee who last updated this revenue recognition entry (system-managed).

                This field is automatically set to the current user when the entry is created
                and updated to the current user on each modification. Used for audit trail and accountability.
              readOnly: true
              example: user123-e89b-12d3-a456-426614174000
            createdAt:
              type: string
              format: date-time
              description: |
                Timestamp when the revenue recognition entry was created (ISO 8601 format).

                Automatically set by the system on creation.
              readOnly: true
              example: '2024-03-15T09:30:00Z'
            updatedAt:
              type: string
              format: date-time
              description: |
                Timestamp of the last update to the revenue recognition entry (ISO 8601 format).

                Automatically updated by the system whenever the entry is modified.
              readOnly: true
              example: '2024-03-15T14:22:00Z'
            isUpdated:
              type: boolean
              description: |
                Indicates whether this entry has been modified since creation.

                This is true when updatedAt differs from createdAt, meaning the entry has been updated
                at least once after its initial creation.
              readOnly: true
              example: false
    revenueRecognitionDeleteResponse:
