    scheduledFeeResponse:
      type: object
      description: Complete scheduled fee representation including system-managed fields
      required:
        - id
        - projectlikeId
        - commercialModel
        - date
        - name
        - amount
        - status
        - createdAt
        - updatedAt
      allOf:
        - $ref: '#/components/schemas/scheduledFeeBase'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              description: Unique identifier for the scheduled fee (generated by system)
              readOnly: true
              example: 123e4567-e89b-12d3-a456-426614174000
            invoiceOtherItemId:
              type: string
              format: uuid
              nullable: true
              description: |
                Reference to the invoice line item when this fee has been added to an invoice.
                This field is populated automatically when the fee is billed.
              readOnly: true
              example: def45678-e89b-12d3-a456-426614174000
            status:
              type: string
              enum:
                - SCHEDULED
                - DRAFT
                - CREATED
                - READY_FOR_EXPORT
                - EXPORTED
              description: |
                Current billing status of the scheduled fee (system-managed):
                - `SCHEDULED`: Fee is planned but not yet added to any invoice
                - `DRAFT`: Fee has been added to a draft invoice
                - `CREATED`: Fee is on a created invoice (not yet ready for export)
                - `READY_FOR_EXPORT`: Fee is on an invoice that is ready to be exported to accounting
                - `EXPORTED`: Fee has been exported to an external accounting system
              readOnly: true
              example: SCHEDULED
            invoiceId:
              type: string
              format: uuid
              nullable: true
              description: |
                Reference to the invoice this fee has been added to.
                Null when status is SCHEDULED, populated when fee is billed.
              readOnly: true
              example: inv98765-e89b-12d3-a456-426614174000
            createdAt:
