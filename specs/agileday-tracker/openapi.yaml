    ProjectCreateRequest:
      type: object
      properties:
        externalId:
          type: string
        name:
          type: string
        description:
          type: string
        language:
          type: string
        segment:
          type: string
        projectType:
          type: string
          enum:
            - INTERNAL
            - EXTERNAL
            - ABSENCE
            - IDLE
        projectCurrency:
          description: Format is ISO 4217
          type: string
        timeReportingPermissionOverride:
          type: string
          nullable: true
          enum:
            - ANYONE
            - ONLY_CONTRACTED
            - ONLY_CONTRACTED_WITH_ALLOCATION
            - NO_ONE
          description: |
            Override time reporting permission for this specific project. This value takes highest priority over global and role-specific permissions from time reporting settings.

            **Allowed Values:**
            - **NULL**: Use global/role-specific permissions from time reporting settings (default behavior)
            - **ANYONE**: Any employee can report time, regardless of contract status. Employee date restrictions still apply.
            - **ONLY_CONTRACTED**: Only employees with active contracts (reservations) can report time. Employee date restrictions still apply.
            - **ONLY_CONTRACTED_WITH_ALLOCATION**: Only contracted employees can report time, and only within their allocation period (reservation start/end dates). Employee date restrictions also apply.
            - **NO_ONE**: No one can report time to this project, regardless of contract status or other permissions.

            **Permission Resolution Order:**
            1. Project-level override (this field) - highest priority
            2. Role-specific permission (if employee has matching accessRole)
            3. Global permission (accessRole = null) - lowest priority

            **Additional Restrictions (always enforced regardless of permission level):**
            - Disabled employees cannot report time
            - Cannot report time before employee start date
            - Cannot report time after employee end date
            - For EXTERNAL/INTERNAL projects: Cannot report to projects in STAGING or FINISHED stage

            See time reporting settings API for more details on permission configuration.
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/ProjectRelationshipUpsertData'
          example:
            - relationship: endCustomer
