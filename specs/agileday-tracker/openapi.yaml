  /v1/skill:
    get:
      tags:
        - Core Data:Skills
      summary: Get all Skills
      description: |
        Retrieve a list of skills with optional filtering, sorting, and pagination.

        **Filtering by timestamps:**
        - Use `createdAfter`/`createdBefore` to filter by creation date
        - Use `updatedAfter`/`updatedBefore` to filter by last update date
        - All timestamps should be in ISO 8601 format (e.g., 2024-01-15T10:30:00Z)

        **Sorting:**
        - Use `sortBy` to specify the field to sort by (createdAt, updatedAt, or name)
        - Use `sortDirection` to specify ascending (asc) or descending (desc) order

        **Pagination:**
        - Use `limit` to specify maximum number of results (default: 100, max: 1000)
        - Use `offset` to skip a number of results for pagination
      operationId: GetSkills
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/createdAfterOptionalParam'
        - $ref: '#/components/parameters/createdBeforeOptionalParam'
        - $ref: '#/components/parameters/updatedAfterOptionalParam'
        - $ref: '#/components/parameters/updatedBeforeOptionalParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/sortByOptionalParam'
        - $ref: '#/components/parameters/sortDirectionOptionalParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Core Data:Skills
      summary: Create a Skill
      description: Create a new skill with optional translations in multiple languages
      operationId: CreateSkill
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
            example:
              name: JavaScript
              description: Programming language for web development
              category: Programming
              translations:
                - language: fi
                  name: JavaScript
                  description: Ohjelmointikieli web-kehitykseen
                - language: sv
                  name: JavaScript
                  description: Programmeringsspråk för webbutveckling
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
